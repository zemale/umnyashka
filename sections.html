<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Секции — УмНяшка 🧠</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .sections-hero {
      padding: 48px 0 32px;
      text-align: center;
    }
    .sections-hero h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 12px; }
    .sections-hero p { color: var(--text2); font-size: 1.05rem; max-width: 520px; margin: 0 auto; }

    .cat-tabs {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 36px;
    }
    .cat-tab {
      padding: 10px 22px; border-radius: 24px; border: 2px solid var(--border);
      background: var(--card); cursor: pointer; font-weight: 700;
      font-family: 'Nunito', sans-serif; font-size: .95rem; color: var(--text2);
      transition: .2s;
    }
    .cat-tab:hover { border-color: var(--sage); color: var(--sage); }
    .cat-tab.active { background: var(--sage); border-color: var(--sage); color: #fff; }

    .sections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px; margin-bottom: 60px;
    }
    .section-card {
      background: var(--card); border-radius: 20px;
      border: 1.5px solid var(--border);
      border-top: 5px solid var(--sc-color, var(--sage));
      padding: 24px 20px 20px;
      cursor: pointer; text-decoration: none; color: var(--text);
      transition: transform .18s, box-shadow .18s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .section-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,.08); }
    .section-card-header { display: flex; align-items: center; gap: 14px; }
    .section-card-emoji { font-size: 2.2rem; }
    .section-card-name { font-size: 1.15rem; font-weight: 900; }
    .section-card-cat {
      font-size: .72rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px; display: inline-block; margin-top: 2px;
    }
    .cat-creative { background: #fff0f5; color: #e8637a; }
    .cat-sport { background: #f0fff4; color: #3d8f3d; }
    .cat-advanced { background: #f5f0ff; color: #7c5cbf; }
    .section-card-desc { font-size: .88rem; color: var(--text2); line-height: 1.5; flex: 1; }
    .section-card-char { font-size: .82rem; color: var(--text3); font-weight: 700; }
    .section-card-topics {
      font-size: .78rem; color: var(--sage); font-weight: 800;
      border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px;
    }

    .cat-label {
      font-size: 1.1rem; font-weight: 900; color: var(--text);
      margin: 32px 0 16px; display: flex; align-items: center; gap: 8px;
    }
    .cat-label::after {
      content: ''; flex: 1; height: 2px; background: var(--border); border-radius: 2px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="bg-deco">
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>
    <div class="bg-blob blob3"></div>
  </div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">УмНяшка 🧠</a>
      <button class="nav-hamburger" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
      <div class="nav-links">
        <a href="subjects.html">Предметы</a>
        <a href="sections.html" class="active">Секции</a>
        <a href="test.html">Диагностика</a>
        <a href="profile.html">Профиль</a>
        <span id="nav-xp" class="nav-badge">⭐ 0 XP</span>
        <span id="nav-streak" class="nav-badge">🔥 0</span>
      </div>
    </div>
  </nav>

  <section class="sections-hero">
    <div class="container">
      <div class="hero-badge">🌟 Внеурочная деятельность</div>
      <h1>Секции и кружки</h1>
      <p>Развивайся за рамками школьной программы — творчество, спорт и углублённые знания</p>
    </div>
  </section>

  <div class="container">
    <div class="cat-tabs">
      <button class="cat-tab active" data-filter="all">✨ Все секции</button>
      <button class="cat-tab" data-filter="creative">🎨 Творческие</button>
      <button class="cat-tab" data-filter="sport">⚽ Спортивные</button>
      <button class="cat-tab" data-filter="advanced">📚 Углублённые</button>
    </div>

    <div id="sections-container"></div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>© 2025 УмНяшка 🧠 — твой умный помощник в учёбе</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const CAT_LABELS = {
      creative: { label: '🎨 Творческие секции', cls: 'cat-creative', text: 'Творческая' },
      sport:    { label: '⚽ Спортивные секции', cls: 'cat-sport',    text: 'Спортивная' },
      advanced: { label: '📚 Углублённые предметы', cls: 'cat-advanced', text: 'Углублённая' },
    };

    let allSections = [];
    let currentFilter = 'all';

    function renderSections(sections) {
      const container = document.getElementById('sections-container');
      if (!sections.length) {
        container.innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px 0">Секции не найдены</p>';
        return;
      }

      if (currentFilter === 'all') {
        // Группируем по категориям
        const groups = {};
        for (const s of sections) {
          if (!groups[s.category]) groups[s.category] = [];
          groups[s.category].push(s);
        }
        const catOrder = ['creative', 'sport', 'advanced'];
        let html = '';
        for (const cat of catOrder) {
          if (!groups[cat]) continue;
          const info = CAT_LABELS[cat] || {};
          html += `<div class="cat-label">${info.label || cat}</div>`;
          html += `<div class="sections-grid">`;
          html += groups[cat].map(s => sectionCard(s)).join('');
          html += `</div>`;
        }
        container.innerHTML = html;
      } else {
        container.innerHTML = `<div class="sections-grid">${sections.map(s => sectionCard(s)).join('')}</div>`;
      }
    }

    function sectionCard(s) {
      const cat = CAT_LABELS[s.category] || {};
      const topicsCount = s.topics ? s.topics.length : 0;
      return `
        <a href="section.html?id=${s.id}" class="section-card" style="--sc-color:${s.color}">
          <div class="section-card-header">
            <span class="section-card-emoji">${s.emoji}</span>
            <div>
              <div class="section-card-name">${s.name}</div>
              <span class="section-card-cat ${cat.cls || ''}">${cat.text || ''}</span>
            </div>
          </div>
          <div class="section-card-desc">${s.description}</div>
          <div class="section-card-char">${s.char_emoji || '👤'} Педагог: ${s.char}</div>
          <div class="section-card-topics">📋 ${topicsCount} занятий</div>
        </a>`;
    }

    // Tabs
    document.querySelectorAll('.cat-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        const filtered = currentFilter === 'all'
          ? allSections
          : allSections.filter(s => s.category === currentFilter);
        renderSections(filtered);
      });
    });

    // Load
    fetch('data/sections.json')
      .then(r => r.json())
      .then(data => {
        allSections = data;
        renderSections(data);
      })
      .catch(() => {
        document.getElementById('sections-container').innerHTML =
          '<p style="text-align:center;color:var(--text2);padding:40px 0">Не удалось загрузить секции</p>';
      });

    updateNavXP();
    updateNavStreak();
  </script>
</body>
</html>
