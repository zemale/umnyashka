<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Результаты — УмНяшка 🧠</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-deco">
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>
    <div class="bg-blob blob3"></div>
  </div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">УмНяшка 🧠</a>
      <button class="nav-hamburger" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
      <div class="nav-links">
        <a href="subjects.html">Предметы</a>
        <a href="test.html">Диагностика</a>
        <a href="profile.html">Профиль</a>
        <span id="nav-xp" class="nav-badge">⭐ 0 XP</span>
        <span id="nav-streak" class="nav-badge">🔥 0</span>
      </div>
    </div>
  </nav>

  <div id="result-container" class="container" style="padding-bottom:60px">
    <div class="loading-text" style="padding:80px 0">Загружаем результаты...</div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const STYLE_MAP = {
      practice: { label: 'Практик 🔧', desc: 'Ты лучше всего учишься через решение задач и практику. Тебе важно сразу применять знания.' },
      reader:   { label: 'Читатель 📖', desc: 'Ты любишь читать и вдумчиво разбирать теорию. Конспекты — твой лучший друг.' },
      visual:   { label: 'Визуал 🎥', desc: 'Тебе нужны схемы, видео и наглядные примеры, чтобы понять материал.' },
      teacher:  { label: 'Учитель 🗣️', desc: 'Ты лучше всего запоминаешь, когда объясняешь кому-то другому. Попробуй учить друзей!' }
    };

    const SUBJECT_MAP = {
      math: { name: 'Математика', emoji: '🔢', id: 'math' },
      algebra: { name: 'Алгебра', emoji: '📐', id: 'algebra' },
      geo: { name: 'Геометрия', emoji: '📏', id: 'geo' },
      russian: { name: 'Русский язык', emoji: '✍️', id: 'russian' },
      lit: { name: 'Литература', emoji: '📚', id: 'lit' },
      history: { name: 'История', emoji: '🏛', id: 'history' },
      social: { name: 'Обществознание', emoji: '🌍', id: 'social' },
      physics: { name: 'Физика', emoji: '⚡', id: 'physics' },
      chem: { name: 'Химия', emoji: '🧪', id: 'chem' },
      bio: { name: 'Биология', emoji: '🌿', id: 'bio' },
      geogr: { name: 'География', emoji: '🗺', id: 'geogr' },
      english: { name: 'Английский', emoji: '🇬🇧', id: 'english' }
    };

    function render() {
      const container = document.getElementById('result-container');
      const raw = localStorage.getItem('umnyashka_test_result');

      if (!raw) {
        container.innerHTML = `
          <div style="text-align:center;padding:80px 20px">
            <div style="font-size:4rem;margin-bottom:16px">🎯</div>
            <h2 style="font-size:1.6rem;font-weight:900;color:var(--text);margin-bottom:12px">Сначала пройди диагностику</h2>
            <p style="color:var(--text2);margin-bottom:24px">Чтобы увидеть результаты, нужно сначала пройти тест</p>
            <a href="test.html" class="btn btn-primary btn-large">Пройти диагностику →</a>
          </div>`;
        return;
      }

      const result = JSON.parse(raw);
      const style = STYLE_MAP[result.learn_style] || STYLE_MAP.practice;
      const fav = SUBJECT_MAP[result.fav_subject] || SUBJECT_MAP.math;
      const weak = SUBJECT_MAP[result.weak_subject] || SUBJECT_MAP.russian;
      const favPct = result.fav_score ? Math.round(result.fav_score.correct / (result.fav_score.total || 10) * 100) : 50;
      const weakPct = result.weak_score ? Math.round(result.weak_score.correct / (result.weak_score.total || 10) * 100) : 30;
      const grade = getGrade();

      fetch('data/topics.json')
        .then(r => r.json())
        .then(topics => {
          const weakTopics = (topics[result.weak_subject] && topics[result.weak_subject][grade]) || [];
          const recs = weakTopics.slice(0, 3);
          const recsHtml = recs.length ? recs.map(t =>
            `<a href="topic.html?subject=${result.weak_subject}&grade=${grade}&topic=${t.id}" class="rec-link">📌 ${t.title} →</a>`
          ).join('') : '<p style="color:var(--text3)">Темы скоро появятся!</p>';
          document.getElementById('recs-container').innerHTML = recsHtml;
        })
        .catch(() => {
          document.getElementById('recs-container').innerHTML = '<p style="color:var(--text3)">Не удалось загрузить темы</p>';
        });

      container.innerHTML = `
        <div class="result-hero">
          <div class="section-label">🎓 Диагностика завершена</div>
          <h1>Твой профиль ученика</h1>
          <p>Вот что мы узнали о тебе за 30 вопросов</p>
        </div>

        <div class="result-card fade-up" style="background:linear-gradient(135deg,var(--sky),#4090b0);color:white;border:none;text-align:center">
          <span class="result-card-emoji">🧠</span>
          <h3 style="font-size:1.3rem;font-weight:900;margin:0 0 8px">Стиль обучения: ${style.label}</h3>
          <p style="opacity:.9;margin:0;font-size:.95rem">${style.desc}</p>
        </div>

        <div class="results-grid">
          <div class="result-card result-strong fade-up" style="animation-delay:.1s">
            <span class="result-card-emoji">${fav.emoji}</span>
            <div class="section-label">Сильный предмет</div>
            <div style="font-size:1.3rem;font-weight:900;color:var(--sage);margin-bottom:10px">${fav.name}</div>
            <div class="score-bar-wrap">
              <div class="score-bar-fill" style="width:${favPct}%;background:linear-gradient(90deg,var(--sage),#5a9e72)"></div>
            </div>
            <div style="font-size:.85rem;color:var(--text3);margin-top:6px;font-weight:700">${favPct}% правильных ответов</div>
          </div>

          <div class="result-card result-weak fade-up" style="animation-delay:.2s">
            <span class="result-card-emoji">${weak.emoji}</span>
            <div class="section-label">Требует внимания</div>
            <div style="font-size:1.3rem;font-weight:900;color:var(--peach);margin-bottom:10px">${weak.name}</div>
            <div class="score-bar-wrap">
              <div class="score-bar-fill" style="width:${weakPct}%;background:linear-gradient(90deg,var(--peach),#d06840)"></div>
            </div>
            <div style="font-size:.85rem;color:var(--text3);margin-top:6px;font-weight:700">${weakPct}% правильных ответов</div>
          </div>
        </div>

        <div class="recs-section fade-up" style="animation-delay:.3s">
          <div class="section-label" style="margin-bottom:16px">🎯 Рекомендуем начать с этих тем:</div>
          <div id="recs-container">Загружаем темы...</div>
        </div>

        <div style="text-align:center;padding:16px 0 40px">
          <a href="subjects.html" class="btn btn-primary btn-large" style="margin-right:12px">Начать учиться →</a>
          <a href="test.html" class="btn-ghost btn-large" style="border-radius:16px;padding:14px 28px;font-size:1rem;font-weight:800;display:inline-block;background:var(--card);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif;">Пройти заново</a>
        </div>
      `;

      checkBadge('diagnostician');
    }

    render();
  </script>
</body>
</html>
