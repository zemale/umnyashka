<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Результаты — УмНяшка 🧠</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">УмНяшка 🧠</a>
      <button class="nav-hamburger">☰</button>
      <div class="nav-links">
        <a href="subjects.html">Предметы</a>
        <a href="test.html">Диагностика</a>
        <a href="profile.html">Профиль</a>
        <span id="nav-xp" class="nav-badge">⭐ 0 XP</span>
        <span id="nav-streak" class="nav-badge">🔥 0</span>
      </div>
    </div>
  </nav>

  <div class="container" id="result-container">
    <div class="loading-text" style="padding:60px 0;text-align:center;font-size:1.5rem">Загружаем результаты...</div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const STYLE_MAP = {
      practice: { label: 'Практик 🔧', desc: 'Ты лучше всего учишься через решение задач и практику. Тебе важно сразу применять знания.' },
      reader:   { label: 'Читатель 📖', desc: 'Ты любишь читать и вдумчиво разбирать теорию. Конспекты — твой лучший друг.' },
      visual:   { label: 'Визуал 🎥', desc: 'Тебе нужны схемы, видео и наглядные примеры, чтобы понять материал.' },
      teacher:  { label: 'Учитель 🗣️', desc: 'Ты лучше всего запоминаешь, когда объясняешь кому-то другому. Попробуй учить друзей!' }
    };

    const SUBJECT_MAP = {
      math: { name: 'Математика', emoji: '🔢', id: 'math' },
      algebra: { name: 'Алгебра', emoji: '📐', id: 'algebra' },
      geo: { name: 'Геометрия', emoji: '📏', id: 'geo' },
      russian: { name: 'Русский язык', emoji: '✍️', id: 'russian' },
      lit: { name: 'Литература', emoji: '📚', id: 'lit' },
      history: { name: 'История', emoji: '🏛', id: 'history' },
      social: { name: 'Обществознание', emoji: '🌍', id: 'social' },
      physics: { name: 'Физика', emoji: '⚡', id: 'physics' },
      chem: { name: 'Химия', emoji: '🧪', id: 'chem' },
      bio: { name: 'Биология', emoji: '🌿', id: 'bio' },
      geogr: { name: 'География', emoji: '🗺', id: 'geogr' },
      english: { name: 'Английский', emoji: '🇬🇧', id: 'english' }
    };

    function render() {
      const container = document.getElementById('result-container');
      const raw = localStorage.getItem('umnyashka_test_result');

      if (!raw) {
        container.innerHTML = `
          <div style="text-align:center;padding:80px 20px">
            <div style="font-size:4rem">🎯</div>
            <h2>Сначала пройди диагностику</h2>
            <p style="color:var(--brown);margin:16px 0">Чтобы увидеть результаты, нужно сначала пройти тест</p>
            <a href="test.html" class="btn btn-primary">Пройти диагностику →</a>
          </div>`;
        return;
      }

      const result = JSON.parse(raw);
      const style = STYLE_MAP[result.learn_style] || STYLE_MAP.practice;
      const fav = SUBJECT_MAP[result.fav_subject] || SUBJECT_MAP.math;
      const weak = SUBJECT_MAP[result.weak_subject] || SUBJECT_MAP.russian;
      const favPct = result.fav_score ? Math.round(result.fav_score.correct / (result.fav_score.total || 10) * 100) : 50;
      const weakPct = result.weak_score ? Math.round(result.weak_score.correct / (result.weak_score.total || 10) * 100) : 30;
      const grade = getGrade();

      // Recommend first 3 topics of weak subject
      fetch('data/topics.json')
        .then(r => r.json())
        .then(topics => {
          const weakTopics = (topics[result.weak_subject] && topics[result.weak_subject][grade]) || [];
          const recs = weakTopics.slice(0, 3);
          const recsHtml = recs.length ? recs.map(t =>
            `<a href="topic.html?subject=${result.weak_subject}&grade=${grade}&topic=${t.id}" class="rec-link">📌 ${t.title}</a>`
          ).join('') : '<p style="color:var(--brown)">Темы скоро появятся!</p>';

          document.getElementById('recs-container').innerHTML = recsHtml;
        })
        .catch(() => {
          document.getElementById('recs-container').innerHTML = '<p style="color:var(--brown)">Не удалось загрузить темы</p>';
        });

      container.innerHTML = `
        <div style="padding:40px 0">
          <h1 style="text-align:center;font-size:2rem;color:var(--brown);margin-bottom:8px">Твой профиль ученика 🎓</h1>
          <p style="text-align:center;color:var(--peach);margin-bottom:40px">Диагностика завершена! Вот что мы узнали</p>

          <div class="result-card" style="background:linear-gradient(135deg,var(--sky),#4a90c4);color:white">
            <div style="font-size:2.5rem;margin-bottom:12px">🧠</div>
            <h3 style="font-size:1.4rem;margin:0 0 8px">Стиль обучения: ${style.label}</h3>
            <p style="opacity:0.9;margin:0">${style.desc}</p>
          </div>

          <div class="results-grid">
            <div class="result-card result-strong">
              <div class="result-card-emoji">${fav.emoji}</div>
              <h3>Сильный предмет</h3>
              <div style="font-size:1.2rem;font-weight:800;color:var(--sage);margin:8px 0">${fav.name}</div>
              <div class="score-bar-wrap">
                <div class="score-bar-fill" style="width:${favPct}%;background:var(--sage)"></div>
              </div>
              <div style="font-size:0.9rem;color:var(--brown);margin-top:6px">${favPct}% правильных ответов</div>
            </div>

            <div class="result-card result-weak">
              <div class="result-card-emoji">${weak.emoji}</div>
              <h3>Требует внимания</h3>
              <div style="font-size:1.2rem;font-weight:800;color:var(--peach);margin:8px 0">${weak.name}</div>
              <div class="score-bar-wrap">
                <div class="score-bar-fill" style="width:${weakPct}%;background:var(--peach)"></div>
              </div>
              <div style="font-size:0.9rem;color:var(--brown);margin-top:6px">${weakPct}% правильных ответов</div>
            </div>
          </div>

          <div class="recs-section">
            <h3 style="color:var(--brown);margin-bottom:16px">🎯 Рекомендуем начать с этих тем:</h3>
            <div id="recs-container">Загружаем темы...</div>
          </div>

          <div style="text-align:center;margin-top:40px">
            <a href="subjects.html" class="btn btn-primary btn-large">Начать учиться →</a>
            <br><br>
            <a href="test.html" style="color:var(--peach);text-decoration:none;font-weight:700">Пройти тест заново</a>
          </div>
        </div>
      `;

      // Award badge
      checkBadge('diagnostician');
    }

    render();
  </script>
</body>
</html>
