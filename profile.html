<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — УмНяшка 🧠</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .activity-dots { display: flex; gap: 8px; flex-wrap: wrap; }
    .activity-dot { width: 28px; height: 28px; border-radius: 8px; background: var(--bg2); border: 1.5px solid var(--border); transition: .2s; }
    .activity-dot.active { background: linear-gradient(135deg, var(--sage), #5a9e72); border-color: var(--sage); }
    .avatar-btn {
      background: none; border: 2px solid transparent; border-radius: 10px;
      font-size: 1.7rem; cursor: pointer; padding: 4px; transition: .2s;
      font-family: 'Nunito', sans-serif;
    }
    .avatar-btn:hover, .avatar-btn.selected {
      border-color: var(--sage); background: var(--sage-light); transform: scale(1.15);
    }
    .badge-card-emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
    .badge-card-name { font-size: .78rem; font-weight: 800; color: var(--text); }
    .badge-card-xp { font-size: .7rem; color: var(--sage); font-weight: 800; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="bg-deco">
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>
    <div class="bg-blob blob3"></div>
  </div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">УмНяшка 🧠</a>
      <button class="nav-hamburger" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
      <div class="nav-links">
        <a href="subjects.html">Предметы</a>
        <a href="test.html">Диагностика</a>
        <a href="profile.html">Профиль</a>
        <span id="nav-xp" class="nav-badge">⭐ 0 XP</span>
        <span id="nav-streak" class="nav-badge">🔥 0</span>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top:32px;padding-bottom:60px;max-width:900px">

    <!-- Profile header -->
    <div class="profile-header">
      <div id="avatar-display" class="profile-avatar-big">🦊</div>
      <div class="profile-info">
        <input type="text" id="nickname-input" class="nickname-input" placeholder="Твой ник" maxlength="20">
        <div id="level-label" class="level-label">Новичок</div>
        <div class="level-bar-wrap">
          <div class="level-bar-fill" id="level-bar" style="width:0%"></div>
        </div>
        <div id="level-progress-text" style="font-size:.8rem;color:var(--text3);margin-top:6px;font-weight:700"></div>
      </div>
    </div>

    <!-- Avatar Picker -->
    <div class="section-card">
      <h3>Выбери аватар</h3>
      <div class="avatar-grid" id="avatar-grid"></div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-xp">0</div>
        <div class="stat-label">Всего XP ⭐</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-streak">0</div>
        <div class="stat-label">Серия дней 🔥</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-topics">0</div>
        <div class="stat-label">Тем пройдено 📖</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-badges">0</div>
        <div class="stat-label">Значков 🏅</div>
      </div>
    </div>

    <!-- Activity -->
    <div class="section-card">
      <h3>Активность (14 дней)</h3>
      <div class="activity-dots" id="activity-dots"></div>
    </div>

    <!-- Subject Progress -->
    <div class="section-card">
      <h3>Прогресс по предметам</h3>
      <div id="subject-progress" class="loading-text" style="padding:20px 0">Загрузка...</div>
    </div>

    <!-- Badges -->
    <div class="section-card">
      <h3>Значки</h3>
      <div class="badges-grid" id="badges-grid">
        <div class="loading-text" style="padding:20px 0">Загрузка...</div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const AVATARS = ['🦊','🐼','🦁','🐯','🦋','🦄','🐬','🦅','🐙','🌟','💎','🚀','🎨','🎮','🎵','📚','🏆','🌈','⚡','🔮'];

    function initProfile() {
      const profile = getProfile();

      // Avatar display & picker
      document.getElementById('avatar-display').textContent = profile.avatar || '🦊';
      const grid = document.getElementById('avatar-grid');
      grid.innerHTML = AVATARS.map(a => `<button class="avatar-btn ${a === profile.avatar ? 'selected' : ''}" onclick="selectAvatar('${a}')">${a}</button>`).join('');

      // Nickname
      const nicknameInput = document.getElementById('nickname-input');
      nicknameInput.value = profile.nickname || '';
      nicknameInput.addEventListener('input', () => {
        const p = getProfile();
        p.nickname = nicknameInput.value;
        setProfile(p);
      });

      // XP & level
      const xp = getXP();
      const lvl = getLevel(xp);
      const prog = getLevelProgress(xp);
      document.getElementById('level-label').textContent = lvl.name;
      document.getElementById('level-bar').style.width = prog.pct + '%';
      document.getElementById('level-progress-text').textContent = prog.max === Infinity
        ? `${xp} XP — максимальный уровень!`
        : `${prog.current} / ${prog.total} XP до «${prog.next}»`;

      // Stats
      document.getElementById('stat-xp').textContent = xp;
      document.getElementById('stat-streak').textContent = getStreak();
      const topicsObj = get('topics', {});
      document.getElementById('stat-topics').textContent = Object.keys(topicsObj).length;
      const badges = getBadges();
      document.getElementById('stat-badges').textContent = badges.length;

      // Activity dots
      const activeDates = get('active_dates', []);
      const dots = document.getElementById('activity-dots');
      const today = new Date();
      dots.innerHTML = Array.from({length: 14}, (_, i) => {
        const d = new Date(today);
        d.setDate(d.getDate() - (13 - i));
        const key = d.toISOString().split('T')[0];
        const active = activeDates.includes(key);
        const label = d.toLocaleDateString('ru', {month:'short', day:'numeric'});
        return `<div class="activity-dot ${active ? 'active' : ''}" title="${label}"></div>`;
      }).join('');

      // Subject progress
      Promise.all([
        fetch('data/subjects.json').then(r => r.json()),
        fetch('data/topics.json').then(r => r.json())
      ]).then(([subjects, topics]) => {
        const grade = getGrade();
        document.getElementById('subject-progress').innerHTML = subjects.map(s => {
          const gradeTopics = (topics[s.id] && topics[s.id][grade]) || [];
          const total = gradeTopics.length;
          const prog = getProgress(s.id, grade, total);
          return `
            <div style="margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                <span style="font-weight:800;color:var(--text)">${s.emoji} ${s.name}</span>
                <span style="color:var(--text3);font-size:.85rem;font-weight:700">${prog.done}/${prog.total}</span>
              </div>
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width:${prog.pct}%;background:${s.color}"></div>
              </div>
            </div>
          `;
        }).join('');
      });

      // Badges
      fetch('data/badges.json')
        .then(r => r.json())
        .then(allBadges => {
          const earned = getBadges();
          document.getElementById('badges-grid').innerHTML = allBadges.map(b => {
            const isEarned = earned.includes(b.id);
            return `
              <div class="badge-card ${isEarned ? 'earned' : 'locked'}" title="${b.desc}">
                <span class="badge-card-emoji">${isEarned ? b.emoji : '🔒'}</span>
                <div class="badge-card-name">${b.name}</div>
                ${isEarned ? `<div class="badge-card-xp">+${b.xp_bonus} XP</div>` : ''}
              </div>
            `;
          }).join('');
        })
        .catch(() => {
          document.getElementById('badges-grid').innerHTML = '<p style="color:var(--text3)">Не удалось загрузить значки</p>';
        });
    }

    window.selectAvatar = function(emoji) {
      document.getElementById('avatar-display').textContent = emoji;
      document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
      const p = getProfile();
      p.avatar = emoji;
      setProfile(p);
    };

    initProfile();
  </script>
</body>
</html>
