<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Секция — УмНяшка 🧠</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Шапка секции ───────────────────────────────────────── */
    .section-header { padding: 32px 0 20px; }
    .section-header-inner { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
    .sec-big-emoji {
      font-size:3.2rem; line-height:1; background:var(--card);
      border-radius:18px; padding:14px; border:2px solid var(--border);
    }
    .sec-hdr-info { flex:1; min-width:200px; }
    .sec-hdr-info h1 { font-size:1.9rem; font-weight:900; margin-bottom:6px; }
    .sec-hdr-desc { color:var(--text2); font-size:.95rem; }
    .sec-char-badge {
      display:flex; align-items:center; gap:8px;
      background:var(--card); border-radius:14px; border:1.5px solid var(--border);
      padding:10px 16px; font-weight:700; font-size:.88rem;
    }
    .sec-level-badge {
      padding:6px 14px; border-radius:20px; font-weight:800; font-size:.82rem;
      margin-top:8px; display:inline-block;
    }
    .level-1 { background:#e8f5ee; color:#2e7d32; }
    .level-2 { background:#fff8e1; color:#f57f17; }
    .level-3 { background:#fce4ec; color:#c62828; }

    /* ── Тест ───────────────────────────────────────────────── */
    .test-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center;
      z-index:900; padding:16px;
    }
    .test-modal {
      background:var(--card); border-radius:24px; width:100%; max-width:560px;
      max-height:90vh; overflow-y:auto; padding:32px 28px;
      box-shadow:0 20px 60px rgba(0,0,0,.25);
    }
    .test-modal h2 { font-size:1.5rem; font-weight:900; margin-bottom:6px; }
    .test-modal .sub { color:var(--text2); font-size:.9rem; margin-bottom:24px; }
    .test-progress-bar {
      height:6px; background:var(--border); border-radius:4px; margin-bottom:24px;
    }
    .test-progress-fill {
      height:100%; background:var(--sage); border-radius:4px; transition:.3s;
    }
    .test-task-num {
      font-size:.75rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.06em; color:var(--text3); margin-bottom:8px;
    }
    .test-task-text {
      font-size:1rem; font-weight:700; line-height:1.5; margin-bottom:8px;
    }
    .test-task-hint {
      font-size:.82rem; color:var(--sage); background:#f0f9f4;
      border-radius:10px; padding:8px 12px; margin-bottom:16px;
    }
    /* Запись */
    .record-area { display:flex; flex-direction:column; align-items:center; gap:12px; }
    .record-btn {
      width:80px; height:80px; border-radius:50%;
      background:var(--sage); border:none; cursor:pointer;
      font-size:2rem; display:flex; align-items:center; justify-content:center;
      transition:.2s; box-shadow:0 4px 16px rgba(0,0,0,.12);
    }
    .record-btn.recording {
      background:#e53935; animation:pulse-rec 1s infinite;
    }
    .record-btn:disabled { opacity:.4; cursor:default; }
    @keyframes pulse-rec {
      0%,100% { box-shadow:0 0 0 0 rgba(229,57,53,.4); }
      50% { box-shadow:0 0 0 16px rgba(229,57,53,0); }
    }
    .record-status { font-size:.88rem; color:var(--text2); font-weight:700; }
    .record-timer { font-size:1.5rem; font-weight:900; color:var(--text); }
    .playback-area { width:100%; }
    .playback-area audio { width:100%; border-radius:10px; margin-top:4px; }
    .rec-done-mark {
      background:#e8f5ee; color:#2e7d32; border-radius:10px;
      padding:8px 14px; font-weight:800; font-size:.85rem; text-align:center;
    }
    /* Навигация теста */
    .test-nav { display:flex; gap:10px; margin-top:20px; }
    .test-nav button {
      flex:1; padding:12px; border-radius:14px; border:none;
      font-family:'Nunito',sans-serif; font-weight:800; font-size:.95rem;
      cursor:pointer; transition:.2s;
    }
    .btn-next { background:var(--sage); color:#fff; }
    .btn-next:hover { filter:brightness(1.08); }
    .btn-next:disabled { opacity:.4; cursor:default; }
    .btn-skip { background:var(--bg2); color:var(--text2); }
    /* Результат теста */
    .test-result { text-align:center; }
    .test-result .level-big {
      font-size:4rem; margin:16px 0 8px;
    }
    .test-result h3 { font-size:1.4rem; font-weight:900; margin-bottom:12px; }
    .test-feedback {
      background:var(--bg2); border-radius:14px; padding:16px 18px;
      text-align:left; font-size:.92rem; line-height:1.6; color:var(--text);
      margin-bottom:20px;
    }
    .start-learning-btn {
      width:100%; padding:14px; background:var(--sage); color:#fff;
      border:none; border-radius:14px; font-family:'Nunito',sans-serif;
      font-weight:800; font-size:1rem; cursor:pointer; transition:.2s;
    }
    .start-learning-btn:hover { filter:brightness(1.08); }

    /* ── Лейаут занятий ─────────────────────────────────────── */
    .section-layout {
      display:grid; grid-template-columns:280px 1fr;
      gap:24px; align-items:start; margin-bottom:48px;
    }
    @media(max-width:768px){ .section-layout{ grid-template-columns:1fr; } }

    .topics-sidebar {
      background:var(--card); border-radius:20px;
      border:1.5px solid var(--border); overflow:hidden;
      position:sticky; top:80px;
    }
    .sidebar-top {
      padding:14px 18px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .sidebar-top .title { font-weight:900; font-size:.9rem; color:var(--text2); }
    .retake-test-btn {
      font-size:.72rem; font-weight:800; color:var(--sage);
      background:none; border:none; cursor:pointer; font-family:'Nunito',sans-serif;
    }
    .level-group-label {
      padding:10px 18px 4px; font-size:.7rem; font-weight:900;
      text-transform:uppercase; letter-spacing:.06em; color:var(--text3);
      background:var(--bg2); border-bottom:1px solid var(--border);
    }
    .topic-item {
      display:flex; align-items:center; gap:10px;
      padding:12px 16px; cursor:pointer;
      border-bottom:1px solid var(--border);
      transition:background .15s; font-size:.88rem; font-weight:700;
    }
    .topic-item:last-child { border-bottom:none; }
    .topic-item:hover { background:var(--bg2); }
    .topic-item.active { background:#e8f5ee; color:var(--sage); }
    .topic-item.done { color:var(--text3); }
    .topic-item.locked { opacity:.45; cursor:default; }
    .topic-item-num {
      width:26px; height:26px; border-radius:50%;
      background:var(--border); display:flex; align-items:center;
      justify-content:center; font-size:.72rem; font-weight:900; flex-shrink:0;
    }
    .topic-item.active .topic-item-num { background:var(--sage); color:#fff; }
    .topic-item.done .topic-item-num { background:#d4edda; color:#28a745; }
    .topic-item-xp { margin-left:auto; font-size:.72rem; color:var(--sage); font-weight:800; }

    /* ── Контент темы ───────────────────────────────────────── */
    .section-main { display:flex; flex-direction:column; gap:20px; }
    .topic-content-card {
      background:var(--card); border-radius:20px; border:1.5px solid var(--border);
      border-top:5px solid var(--sc-color,var(--sage)); padding:28px;
    }
    .topic-level-tag {
      display:inline-block; padding:4px 12px; border-radius:20px;
      font-size:.72rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.04em; margin-bottom:14px;
    }
    .topic-content-title { font-size:1.35rem; font-weight:900; margin-bottom:16px; }
    .topic-theory {
      background:var(--bg2); border-radius:14px; padding:16px 18px;
      font-size:.93rem; line-height:1.7; margin-bottom:18px;
    }
    .block-label {
      font-size:.72rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.06em; color:var(--text3); margin-bottom:6px;
    }
    .exercise-card {
      background:#f0f9f4; border:1.5px solid #c8e6d0;
      border-radius:14px; padding:16px 18px; margin-bottom:16px;
    }
    .exercise-card .block-label { color:var(--sage); }
    .exercise-text { font-size:.93rem; line-height:1.6; }
    .done-btn {
      width:100%; padding:13px; font-size:.95rem; font-weight:800;
      background:var(--sage); color:#fff; border:none; border-radius:14px;
      cursor:pointer; font-family:'Nunito',sans-serif; transition:.2s;
    }
    .done-btn:hover { filter:brightness(1.08); }
    .done-btn:disabled { background:#d4edda; color:#28a745; cursor:default; }
    .locked-msg {
      text-align:center; padding:40px 20px; color:var(--text2);
    }
    .locked-msg .lock-icon { font-size:2.5rem; margin-bottom:10px; }

    /* ── Чат ────────────────────────────────────────────────── */
    .chat-card {
      background:var(--card); border-radius:20px; border:1.5px solid var(--border); overflow:hidden;
    }
    .chat-card-header {
      display:flex; align-items:center; gap:14px;
      padding:16px 20px; border-bottom:1px solid var(--border); background:var(--bg2);
    }
    .chat-avatar {
      width:44px; height:44px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:1.4rem;
    }
    .chat-info .cname { font-weight:900; font-size:.95rem; }
    .chat-info .cdesc { font-size:.75rem; color:var(--text2); }
    .chat-messages {
      height:300px; overflow-y:auto; padding:14px 16px;
      display:flex; flex-direction:column; gap:10px;
    }
    .chat-msg {
      max-width:80%; padding:10px 13px; border-radius:14px;
      font-size:.9rem; line-height:1.5;
    }
    .chat-msg.user { align-self:flex-end; background:var(--sage); color:#fff; border-bottom-right-radius:4px; }
    .chat-msg.char { align-self:flex-start; background:var(--bg2); color:var(--text); border-bottom-left-radius:4px; }
    .chat-typing { align-self:flex-start; display:flex; gap:4px; padding:12px 13px; background:var(--bg2); border-radius:14px; border-bottom-left-radius:4px; }
    .chat-typing span { width:6px; height:6px; background:var(--text3); border-radius:50%; animation:typing-b .8s infinite; }
    .chat-typing span:nth-child(2){ animation-delay:.15s; }
    .chat-typing span:nth-child(3){ animation-delay:.3s; }
    @keyframes typing-b { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .chat-input-row { display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--border); }
    .chat-input {
      flex:1; padding:9px 13px; border-radius:11px;
      border:1.5px solid var(--border); background:var(--bg2);
      font-family:'Nunito',sans-serif; font-size:.9rem; color:var(--text); outline:none;
    }
    .chat-input:focus { border-color:var(--sage); }
    .chat-send-btn {
      padding:9px 16px; background:var(--sage); color:#fff;
      border:none; border-radius:11px; cursor:pointer;
      font-weight:800; font-family:'Nunito',sans-serif; transition:.2s;
    }
    .chat-send-btn:disabled { opacity:.5; cursor:default; }

    .no-topic { text-align:center; padding:60px 20px; color:var(--text2); }
    .no-topic .big { font-size:3rem; margin-bottom:10px; }
    .take-test-cta {
      background:var(--card); border-radius:20px; border:1.5px dashed var(--sage);
      padding:32px; text-align:center; margin-bottom:20px;
    }
    .take-test-cta h3 { font-size:1.2rem; font-weight:900; margin-bottom:8px; }
    .take-test-cta p { color:var(--text2); margin-bottom:16px; font-size:.92rem; }
    .take-test-cta button {
      padding:13px 28px; background:var(--sage); color:#fff;
      border:none; border-radius:14px; font-family:'Nunito',sans-serif;
      font-weight:800; font-size:.95rem; cursor:pointer; transition:.2s;
    }
    .take-test-cta button:hover { filter:brightness(1.08); }
  </style>
</head>

  <script src="js/app.js"></script>

  <script>
  const params = new URLSearchParams(location.search);
  const sectionId = params.get('id');

  let section = null;
  let userLevel = null;          // 1 / 2 / 3
  let currentTopic = null;
  let completedTopics = get('section_done_' + sectionId, []);

  const LEVEL_NAMES = { 1:'Начинающий 🌱', 2:'Средний 🔥', 3:'Продвинутый ⭐' };
  const LEVEL_CLS   = { 1:'level-1', 2:'level-2', 3:'level-3' };

  // ── ПРОМПТЫ ─────────────────────────────────────────────────
  const SECTION_PROMPTS = {
    vocal:        `Ты — Алина, педагог по вокалу. Говоришь тепло, поддерживающе. Даёшь конкретные советы по технике голоса. Отвечай по-русски, 3–5 предложений.`,
    theatre:      `Ты — Михаил, педагог актёрского мастерства. Говоришь ярко, с театральной страстью. Вдохновляешь на живую игру. Отвечай по-русски, 3–5 предложений.`,
    drawing:      `Ты — Настя, художник и педагог. Говоришь образно, учишь видеть. Отвечай по-русски, 3–5 предложений.`,
    dance:        `Ты — Вика, хореограф. Говоришь энергично, объясняешь через образы и чувства. Отвечай по-русски, 3–5 предложений.`,
    photography:  `Ты — Артём, фотограф. Говоришь наблюдательно, учишь видеть красоту в обычном. Отвечай по-русски, 3–5 предложений.`,
    music:        `Ты — Олег, педагог теории музыки. Говоришь с любовью к музыке, объясняешь через слух. Отвечай по-русски, 3–5 предложений.`,
    football:     `Ты — Сергей, тренер по футболу. Говоришь коротко, по-тренерски, конкретно. Отвечай по-русски, 3–5 предложений.`,
    swimming:     `Ты — Анна, тренер по плаванию. Говоришь методично, акцентируешь на технике. Отвечай по-русски, 3–5 предложений.`,
    lit_deep:     `Ты — Елена Ивановна, литературовед. Говоришь интеллигентно, задаёшь вопросы которые меняют взгляд. Отвечай по-русски, 3–6 предложений.`,
    bio_deep:     `Ты — Дмитрий Сергеевич, биолог. Говоришь точно, любишь удивлять фактами. Отвечай по-русски, 3–6 предложений.`,
    history_deep: `Ты — Игорь Николаевич, историк. Говоришь через судьбы людей, объясняешь логику событий. Отвечай по-русски, 3–6 предложений.`,
    math_deep:    `Ты — Павел Андреевич, математик. Никогда не даёшь готовый ответ — только наводящие вопросы. Отвечай по-русски, 3–5 предложений.`,
    ecology:      `Ты — Мария, эколог. Говоришь с верой в то, что каждый может изменить ситуацию. Отвечай по-русски, 3–5 предложений.`,
  };

  function getEvalPrompt(sec, tasks, transcripts) {
    const lines = tasks.map((t, i) => `Задание ${i+1}: «${t.instruction}»\nОтвет ученика: ${transcripts[i] || '(нет записи)'}`).join('\n\n');
    return `Ты — ${sec.char}, педагог. Оцени вступительный тест ученика.\n\n${lines}\n\nОпредели уровень: 1 (Начинающий), 2 (Средний) или 3 (Продвинутый).\nДай конкретный персональный фидбэк: что хорошо, что нужно улучшить.\n\nФормат ответа строго:\nУРОВЕНЬ: [1/2/3]\nФИДБЭК: [твой комментарий, 4–6 предложений, по-русски, обращайся на «ты»]`;
  }

  // ── АУДИО ЗАПИСЬ ────────────────────────────────────────────
  let mediaRecorder = null;
  let audioChunks = [];
  let recordingTimer = null;
  let recordingSeconds = 0;
  const MAX_RECORD_SECONDS = 60;

  async function startRecording(onStop) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        onStop(blob);
      };
      mediaRecorder.start();
      return true;
    } catch(e) {
      return false;
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    clearInterval(recordingTimer);
  }

  function getSupportedMimeType() {
    const types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
    return types.find(t => MediaRecorder.isTypeSupported(t)) || 'audio/webm';
  }

  function blobToBase64(blob) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(blob);
    });
  }

  async function transcribeAudio(blob) {
    // Отправляем аудио в Gemini для транскрипции
    const b64 = await blobToBase64(blob);
    const mimeType = blob.type || 'audio/webm';
    const body = {
      contents: [{
        parts: [
          { text: 'Транскрибируй эту аудиозапись дословно. Только текст, без комментариев.' },
          { inlineData: { mimeType, data: b64 } }
        ]
      }],
      generationConfig: { maxOutputTokens: 500, temperature: 0.2 }
    };
    const resp = await fetch(GEMINI_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
  }

  // ── ТЕСТ ────────────────────────────────────────────────────
  let testStep = 0;
  let testBlobs = [];
  let testTranscripts = [];

  function startTest() {
    testStep = 0;
    testBlobs = [];
    testTranscripts = [];
    document.getElementById('test-overlay').style.display = 'flex';
    renderTestStep();
  }

  function renderTestStep() {
    const tasks = section.test_tasks || [];
    const modal = document.getElementById('test-modal');
    const pct = Math.round(testStep / tasks.length * 100);

    if (testStep >= tasks.length) {
      renderTestProcessing(modal, tasks);
      return;
    }

    const task = tasks[testStep];
    const hasBlob = !!testBlobs[testStep];

    modal.innerHTML = `
      <h2>🎤 Вступительный тест</h2>
      <p class="sub">Педагог оценит твои ответы и подберёт подходящий уровень</p>
      <div class="test-progress-bar"><div class="test-progress-fill" style="width:${pct}%"></div></div>
      <div class="test-task-num">Задание ${testStep + 1} из ${tasks.length}</div>
      <div class="test-task-text">${task.instruction}</div>
      <div class="test-task-hint">💡 ${task.hint}</div>
      <div class="record-area">
        <div class="record-timer" id="rec-timer">0:00</div>
        <div class="record-status" id="rec-status">Нажми кнопку чтобы начать запись</div>
        <button class="record-btn" id="rec-btn" onclick="toggleRecord()">🎤</button>
        ${hasBlob ? `<div class="rec-done-mark">✅ Записано! Можешь перезаписать или перейти дальше.</div>
          <div class="playback-area"><audio id="playback" controls></audio></div>` : ''}
      </div>
      <div class="test-nav">
        <button class="btn-skip" onclick="skipTask()">Пропустить</button>
        <button class="btn-next" id="btn-next" onclick="nextTask()" ${!hasBlob ? 'disabled' : ''}>
          ${testStep < tasks.length - 1 ? 'Следующее →' : 'Отправить на проверку ✓'}
        </button>
      </div>`;

    if (hasBlob) {
      const url = URL.createObjectURL(testBlobs[testStep]);
      document.getElementById('playback').src = url;
    }
  }

  let isRecording = false;

  async function toggleRecord() {
    const btn = document.getElementById('rec-btn');
    const status = document.getElementById('rec-status');
    const timerEl = document.getElementById('rec-timer');

    if (!isRecording) {
      const ok = await startRecording(blob => {
        testBlobs[testStep] = blob;
        isRecording = false;
        renderTestStep();
      });
      if (!ok) {
        status.textContent = '❌ Нет доступа к микрофону. Проверь разрешения.';
        return;
      }
      isRecording = true;
      btn.classList.add('recording');
      btn.textContent = '⏹';
      status.textContent = 'Идёт запись... Нажми ещё раз чтобы остановить';
      recordingSeconds = 0;
      recordingTimer = setInterval(() => {
        recordingSeconds++;
        const m = Math.floor(recordingSeconds / 60);
        const s = recordingSeconds % 60;
        timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if (recordingSeconds >= MAX_RECORD_SECONDS) { toggleRecord(); }
      }, 1000);
    } else {
      stopRecording();
      isRecording = false;
    }
  }

  function skipTask() {
    testBlobs[testStep] = null;
    testTranscripts[testStep] = '(нет ответа)';
    testStep++;
    renderTestStep();
  }

  function nextTask() {
    testStep++;
    renderTestStep();
  }

  async function renderTestProcessing(modal, tasks) {
    modal.innerHTML = `
      <div style="text-align:center;padding:40px 0">
        <div style="font-size:3rem;margin-bottom:16px">🤔</div>
        <h3 style="font-weight:900;margin-bottom:8px">Педагог оценивает твои ответы...</h3>
        <p style="color:var(--text2)">Обрабатываем записи — это займёт 15–30 секунд</p>
        <div class="chat-typing" style="justify-content:center;margin-top:20px">
          <span></span><span></span><span></span>
        </div>
      </div>`;

    // Транскрибируем все записи
    for (let i = 0; i < tasks.length; i++) {
      if (testBlobs[i]) {
        try {
          testTranscripts[i] = await transcribeAudio(testBlobs[i]);
        } catch(e) {
          testTranscripts[i] = '(не удалось распознать запись)';
        }
      } else if (!testTranscripts[i]) {
        testTranscripts[i] = '(нет ответа)';
      }
    }

    // Просим Gemini оценить
    let level = 1;
    let feedback = '';
    try {
      const evalPrompt = getEvalPrompt(section, tasks, testTranscripts);
      const result = await callGemini(
        `Ты педагог ${section.char}. Проведи оценку вступительного теста.`,
        [{ role: 'user', parts: [{ text: evalPrompt }] }],
        0
      );
      const lvlMatch = result.match(/УРОВЕНЬ:\s*([123])/i);
      const fbMatch = result.match(/ФИДБЭК:\s*([\s\S]+)/i);
      if (lvlMatch) level = parseInt(lvlMatch[1]);
      feedback = fbMatch ? fbMatch[1].trim() : result;
    } catch(e) {
      feedback = 'Отличное начало! Я определила твой уровень на основе твоих ответов. Начнём с основ и будем двигаться вперёд.';
    }

    // Сохраняем уровень
    userLevel = level;
    set('section_level_' + sectionId, level);

    renderTestResult(modal, level, feedback);
  }

  function renderTestResult(modal, level, feedback) {
    const lvlEmoji = ['','🌱','🔥','⭐'][level];
    const lvlName = ['','Начинающий','Средний','Продвинутый'][level];
    modal.innerHTML = `
      <div class="test-result">
        <div class="level-big">${lvlEmoji}</div>
        <h3>Твой уровень: ${lvlName}</h3>
        <div class="test-feedback">${feedback.replace(/\n/g,'<br>')}</div>
        <button class="start-learning-btn" onclick="closeTest()">
          Начать занятия на уровне «${lvlName}» →
        </button>
      </div>`;
  }

  function closeTest() {
    document.getElementById('test-overlay').style.display = 'none';
    renderTopics();
    renderLevelBadge();
    // Выбрать первую тему доступного уровня
    const first = section.topics.find(t => t.level <= userLevel && !completedTopics.includes(t.id));
    if (first) selectTopic(first.id);
  }

  // ── УРОВЕНЬ И ТЕМЫ ──────────────────────────────────────────
  function renderLevelBadge() {
    if (!userLevel) return;
    const el = document.getElementById('hdr-level');
    const name = LEVEL_NAMES[userLevel] || '';
    const cls = LEVEL_CLS[userLevel] || '';
    el.innerHTML = `<span class="sec-level-badge ${cls}">Твой уровень: ${name}</span>`;
  }

  function renderTopics() {
    const list = document.getElementById('topics-list');
    if (!section.topics) return;

    const groups = { 1: [], 2: [], 3: [] };
    section.topics.forEach((t, i) => groups[t.level || 1].push({ ...t, _idx: i }));

    const labels = { 1: '🌱 Начинающий', 2: '🔥 Средний', 3: '⭐ Продвинутый' };
    let html = '';

    for (const lvl of [1, 2, 3]) {
      if (!groups[lvl].length) continue;
      html += `<div class="level-group-label">${labels[lvl]}</div>`;
      for (const t of groups[lvl]) {
        const done = completedTopics.includes(t.id);
        const active = currentTopic && currentTopic.id === t.id;
        const locked = userLevel && t.level > userLevel;
        html += `
          <div class="topic-item ${active ? 'active' : ''} ${done ? 'done' : ''} ${locked ? 'locked' : ''}"
               onclick="${locked ? '' : `selectTopic('${t.id}')`}">
            <div class="topic-item-num">${done ? '✓' : locked ? '🔒' : t._idx + 1}</div>
            <div style="flex:1">${t.title}</div>
            <div class="topic-item-xp">+${t.xp} XP</div>
          </div>`;
      }
    }
    list.innerHTML = html;
  }

  function selectTopic(topicId) {
    currentTopic = section.topics.find(t => t.id === topicId);
    if (!currentTopic) return;
    renderTopics();
    renderTopicContent();
    document.getElementById('chat-area').style.display = '';
    if (window.innerWidth < 768) {
      document.getElementById('topic-area').scrollIntoView({ behavior: 'smooth' });
    }
  }

  function renderTopicContent() {
    const done = completedTopics.includes(currentTopic.id);
    const locked = userLevel && currentTopic.level > userLevel;
    const lvlName = LEVEL_NAMES[currentTopic.level] || '';
    const lvlCls = LEVEL_CLS[currentTopic.level] || '';

    if (locked) {
      document.getElementById('topic-area').innerHTML = `
        <div class="topic-content-card" style="--sc-color:${section.color}">
          <div class="locked-msg">
            <div class="lock-icon">🔒</div>
            <strong>Занятие пока закрыто</strong><br>
            Оно откроется когда ты достигнешь уровня «${lvlName}».<br><br>
            <button onclick="startTest()" style="padding:10px 22px;background:var(--sage);color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer">
              Пересдать тест →
            </button>
          </div>
        </div>`;
      return;
    }

    document.getElementById('topic-area').innerHTML = `
      <div class="topic-content-card" style="--sc-color:${section.color}">
        <span class="topic-level-tag ${lvlCls}">${lvlName}</span>
        <div class="topic-content-title">${currentTopic.title}</div>
        <div class="topic-theory">
          <div class="block-label">📖 Теория</div>
          ${currentTopic.theory}
        </div>
        ${currentTopic.exercise ? `
        <div class="exercise-card">
          <div class="block-label">💪 Практика</div>
          <div class="exercise-text">${currentTopic.exercise}</div>
        </div>` : ''}
        <button class="done-btn" id="done-btn" onclick="markDone()" ${done ? 'disabled' : ''}>
          ${done ? '✅ Занятие пройдено!' : '✅ Выполнил задание — получить XP'}
        </button>
      </div>`;
  }

  function markDone() {
    if (!currentTopic || completedTopics.includes(currentTopic.id)) return;
    completedTopics.push(currentTopic.id);
    set('section_done_' + sectionId, completedTopics);
    addXP(currentTopic.xp, currentTopic.title);
    updateStreak();
    const btn = document.getElementById('done-btn');
    if (btn) { btn.disabled = true; btn.textContent = '✅ Занятие пройдено!'; }
    renderTopics();
  }

  // ── ЧАТ ─────────────────────────────────────────────────────
  let chatHistory = [];
  let chatSending = false;

  function initChat() {
    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('chat-send');

    document.getElementById('chat-avatar').textContent = section.char_emoji || '👤';
    document.getElementById('chat-char-name').textContent = section.char;
    document.getElementById('chat-char-desc').textContent = section.char_desc || '';

    appendMsg('char', `Привет! Я ${section.char} 👋 Задавай любые вопросы — по занятиям или просто так!`);

    async function send() {
      const text = inputEl.value.trim();
      if (!text || chatSending) return;
      inputEl.value = '';
      appendMsg('user', text);
      chatSending = true; sendBtn.disabled = true; sendBtn.textContent = '...';

      const typing = document.createElement('div');
      typing.className = 'chat-typing'; typing.id = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(typing);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        let sys = SECTION_PROMPTS[sectionId] || `Ты педагог. Говори дружелюбно. Отвечай по-русски.`;
        if (currentTopic) sys += `\n\nСейчас изучается: «${currentTopic.title}». ${currentTopic.theory?.slice(0,200) || ''}`;
        const contents = [
          ...chatHistory.slice(-8).map(m => ({ role: m.r === 'user' ? 'user' : 'model', parts: [{ text: m.t }] })),
          { role: 'user', parts: [{ text }] }
        ];
        const reply = await callGemini(sys, contents);
        document.getElementById('typing')?.remove();
        appendMsg('char', reply);
      } catch(e) {
        document.getElementById('typing')?.remove();
        appendMsg('char', 'Хм, что-то пошло не так 😅 Попробуй ещё раз!');
      } finally {
        chatSending = false; sendBtn.disabled = false; sendBtn.textContent = '→';
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

    function appendMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'chat-msg ' + role;
      div.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
      messagesEl.appendChild(div);
      chatHistory.push({ r: role, t: text });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  // ── ЗАГРУЗКА ─────────────────────────────────────────────────
  fetch('data/sections.json')
    .then(r => r.json())
    .then(sections => {
      section = sections.find(s => s.id === sectionId);
      if (!section) { document.getElementById('hdr-name').textContent = 'Секция не найдена'; return; }

      document.title = section.name + ' — УмНяшка 🧠';
      document.getElementById('hdr-emoji').textContent = section.emoji;
      document.getElementById('hdr-name').textContent = section.name;
      document.getElementById('hdr-desc').textContent = section.description;
      document.getElementById('hdr-char').innerHTML = `<span style="font-size:1.2rem">${section.char_emoji||'👤'}</span> ${section.char}`;

      userLevel = get('section_level_' + sectionId, null);

      document.getElementById('section-layout').style.display = '';
      renderTopics();
      renderLevelBadge();
      initChat();

      if (!userLevel && section.test_tasks?.length) {
        // Первый визит — показываем CTA для теста
        document.getElementById('topic-area').innerHTML = `
          <div class="take-test-cta">
            <h3>Пройди вступительный тест</h3>
            <p>Педагог оценит твои навыки и подберёт занятия по твоему уровню. Займёт 3–5 минут.</p>
            <button onclick="startTest()">Начать тест 🎤</button>
          </div>`;
      } else {
        // Выбрать первую незавершённую тему доступного уровня
        const first = section.topics.find(t =>
          (!userLevel || t.level <= userLevel) && !completedTopics.includes(t.id)
        ) || section.topics[0];
        if (first) selectTopic(first.id);
        document.getElementById('chat-area').style.display = '';
      }
    });

  updateNavXP();
  updateNavStreak();
  </script>
</body>
</html>
