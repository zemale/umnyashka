<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Направление — ПрофУчёба 🎓</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dir-header { padding:32px 0 24px; }
    .dir-header-inner { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
    .dir-big-emoji {
      font-size:3rem; background:var(--card); border-radius:18px;
      padding:14px; border:2px solid var(--border);
    }
    .dir-hdr-info h1 { font-size:1.9rem; font-weight:900; margin-bottom:6px; }
    .dir-hdr-info p { color:var(--text2); font-size:.93rem; }

    .prof-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:20px; margin-bottom:48px;
    }
    .prof-card {
      background:var(--card); border-radius:20px; border:1.5px solid var(--border);
      overflow:hidden; transition:.18s; text-decoration:none; display:block;
    }
    .prof-card:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(0,0,0,.1); }
    .prof-card-top {
      padding:20px 20px 16px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:14px;
    }
    .prof-avatar {
      width:52px; height:52px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.6rem; flex-shrink:0;
    }
    .prof-card-name { font-size:1.1rem; font-weight:900; margin-bottom:3px; }
    .prof-card-desc { color:var(--text2); font-size:.83rem; line-height:1.4; }
    .prof-topics {
      padding:14px 20px;
    }
    .prof-topics-label {
      font-size:.7rem; font-weight:900; text-transform:uppercase;
      letter-spacing:.06em; color:var(--text3); margin-bottom:8px;
    }
    .prof-topic-row {
      display:flex; align-items:center; gap:8px; padding:5px 0;
      border-bottom:1px solid var(--border); font-size:.85rem; font-weight:700;
    }
    .prof-topic-row:last-child { border-bottom:none; }
    .topic-done-dot {
      width:8px; height:8px; border-radius:50%; flex-shrink:0;
    }
    .prof-start-btn {
      display:block; margin:12px 20px 16px;
      padding:11px; background:var(--sage); color:#fff;
      border-radius:12px; text-align:center; font-weight:800;
      font-size:.9rem; text-decoration:none; transition:.2s;
    }
    .prof-start-btn:hover { filter:brightness(1.08); }
    .prof-progress-bar {
      height:4px; background:var(--border); margin:0 20px 4px;
      border-radius:4px;
    }
    .prof-progress-fill { height:100%; background:var(--sage); border-radius:4px; }
    .prof-progress-text {
      padding:0 20px 4px; font-size:.72rem; color:var(--text3); font-weight:700;
    }
  </style>
</head>
<body>
  <div class="bg-deco">
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>
    <div class="bg-blob blob3"></div>
  </div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">УмНяшка 🧠</a>
      <button class="nav-hamburger" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
      <div class="nav-links">
        <a href="subjects.html">Предметы</a>
        <a href="sections.html">Секции</a>
        <a href="profuniversity.html">ПрофУчёба</a>
        <a href="test.html">Диагностика</a>
        <a href="profile.html">Профиль</a>
        <span id="nav-xp" class="nav-badge">⭐ 0 XP</span>
        <span id="nav-streak" class="nav-badge">🔥 0</span>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="dir-header">
      <div style="margin-bottom:10px">
        <a href="profuniversity.html" style="color:var(--text3);font-size:.83rem;font-weight:700;text-decoration:none">← Все направления</a>
      </div>
      <div class="dir-header-inner">
        <div class="dir-big-emoji" id="hdr-emoji">⏳</div>
        <div class="dir-hdr-info">
          <h1 id="hdr-name">Загрузка...</h1>
          <p id="hdr-desc"></p>
        </div>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:16px">👩‍🎓 Профессии направления</div>
    <div class="prof-grid" id="prof-grid">
      <div class="loading-text">Загружаем профессии...</div>
    </div>
  </div>

  <footer class="footer">
    <div class="container"><p>© 2025 УмНяшка 🧠</p></div>
  </footer>

  <script src="js/app.js"></script>
  <script>
  const dirId = new URLSearchParams(location.search).get('id');

  fetch('data/profuniversity.json')
    .then(r => r.json())
    .then(directions => {
      const dir = directions.find(d => d.id === dirId);
      if (!dir) { document.getElementById('hdr-name').textContent = 'Не найдено'; return; }

      document.title = dir.name + ' — ПрофУчёба 🎓';
      document.getElementById('hdr-emoji').textContent = dir.emoji;
      document.getElementById('hdr-name').textContent = dir.name;
      document.getElementById('hdr-desc').textContent = dir.desc;

      const grid = document.getElementById('prof-grid');
      grid.innerHTML = dir.professions.map(prof => {
        const doneTopics = get(`pu_done_${dirId}_${prof.id}`, []);
        const totalTopics = prof.topics.length;
        const donePct = Math.round(doneTopics.length / totalTopics * 100);

        const topicsHTML = prof.topics.slice(0,4).map((t, i) => {
          const done = doneTopics.includes(t.id);
          return `<div class="prof-topic-row">
            <div class="topic-done-dot" style="background:${done ? 'var(--sage)' : 'var(--border)'}"></div>
            ${t.title}
          </div>`;
        }).join('') + (totalTopics > 4 ? `<div class="prof-topic-row" style="color:var(--text3)">
          <div class="topic-done-dot" style="background:var(--border)"></div>
          + ещё ${totalTopics - 4} темы
        </div>` : '');

        return `
          <div class="prof-card">
            <div class="prof-card-top">
              <div class="prof-avatar" style="background:${dir.color}22">${prof.emoji}</div>
              <div>
                <div class="prof-card-name">${prof.name}</div>
                <div class="prof-card-desc">${prof.desc}</div>
              </div>
            </div>
            <div class="prof-topics">
              <div class="prof-topics-label">📚 Темы курса</div>
              ${topicsHTML}
            </div>
            <div class="prof-progress-bar">
              <div class="prof-progress-fill" style="width:${donePct}%"></div>
            </div>
            <div class="prof-progress-text">${doneTopics.length} из ${totalTopics} тем · ${donePct}%</div>
            <a href="proflesson.html?dir=${dirId}&prof=${prof.id}&topic=${prof.topics[0].id}" class="prof-start-btn">
              ${doneTopics.length > 0 ? '▶ Продолжить' : '🚀 Начать изучение'} →
            </a>
          </div>`;
      }).join('');
    });

  updateNavXP();
  updateNavStreak();
  </script>
</body>
</html>
