<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тема — УмНяшка 🧠</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-deco">
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>
    <div class="bg-blob blob3"></div>
  </div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">УмНяшка 🧠</a>
      <button class="nav-hamburger" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
      <div class="nav-links">
        <a href="subjects.html">Предметы</a>
        <a href="test.html">Диагностика</a>
        <a href="profile.html">Профиль</a>
        <span id="nav-xp" class="nav-badge">⭐ 0 XP</span>
        <span id="nav-streak" class="nav-badge">🔥 0</span>
      </div>
    </div>
  </nav>

  <div id="topic-breadcrumb" class="breadcrumb">Загрузка...</div>

  <div class="topic-layout container">
    <!-- LEFT: Theory -->
    <div class="theory-panel" id="theory-panel">
      <div class="loading-text">Загружаем тему...</div>
    </div>

    <!-- RIGHT: Chat -->
    <div class="chat-panel">
      <div class="chat-char-header" id="chat-char-header">
        <span id="chat-char-emoji" style="font-size:2rem">🤖</span>
        <div>
          <div id="chat-char-name" style="font-weight:800;color:var(--text)">Персонаж</div>
          <div style="font-size:.78rem;color:var(--text3);font-weight:700">спрашивай меня!</div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" class="chat-input" placeholder="Задай вопрос...">
        <button id="chat-send" class="btn btn-primary btn-sm">→</button>
      </div>
      <button id="chat-clear" class="btn btn-sm btn-secondary" style="margin-top:8px;width:100%">Очистить чат</button>
    </div>
  </div>

  <!-- Exercises -->
  <div class="exercises-section container" id="exercises-section" style="display:none">
    <div class="section-label">📝 Упражнения</div>
    <h2>Закрепи знания</h2>
    <div class="ex-tabs">
      <button class="ex-tab active" data-tab="mcq">🎯 Тест</button>
      <button class="ex-tab" data-tab="fill">✏️ Пропуски</button>
      <button class="ex-tab" data-tab="match">🔀 Соответствие</button>
    </div>
    <div id="ex-mcq" class="ex-panel active"></div>
    <div id="ex-fill" class="ex-panel"></div>
    <div id="ex-match" class="ex-panel"></div>
    <div id="ex-completion" class="ex-completion" style="display:none"></div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/gemini.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const subjectId = params.get('subject') || 'math';
    const grade = parseInt(params.get('grade') || getGrade());
    const topicId = params.get('topic') || '';

    let currentTopic = null;
    let allTopics = [];
    let currentSubject = null;
    let exState = { mcq: false, fill: false, match: false };

    Promise.all([
      fetch('data/topics.json').then(r => r.json()),
      fetch('data/subjects.json').then(r => r.json()),
      fetch('data/exercises.json').then(r => r.json()).catch(() => ({}))
    ]).then(([topics, subjects, exercises]) => {
      const subj = subjects.find(s => s.id === subjectId) || subjects[0];
      currentSubject = subj;
      const gradeTopics = (topics[subjectId] && topics[subjectId][grade]) || [];
      allTopics = gradeTopics;
      const topic = gradeTopics.find(t => t.id === topicId) || gradeTopics[0];
      if (!topic) {
        document.getElementById('theory-panel').innerHTML = '<p style="color:var(--text3)">Тема не найдена</p>';
        return;
      }
      currentTopic = topic;
      document.title = topic.title + ' — УмНяшка 🧠';

      // Breadcrumb
      document.getElementById('topic-breadcrumb').innerHTML = `
        <a href="subjects.html">Предметы</a> → 
        <a href="subject.html?id=${subjectId}&grade=${grade}">${subj.name}</a> → 
        ${topic.title}
      `;

      // Theory
      document.getElementById('theory-panel').innerHTML = `
        <h2>${topic.title}</h2>
        <p>${topic.theory}</p>
        ${topic.formulas && topic.formulas.length ? `
          <div class="formula-box">
            <div style="font-weight:800;color:var(--text);margin-bottom:8px">📐 Формулы</div>
            ${topic.formulas.map(f => `<div style="margin-bottom:6px">${f}</div>`).join('')}
          </div>
        ` : ''}
        ${topic.example ? `
          <div class="example-box">
            <div style="font-weight:800;color:var(--sky);margin-bottom:8px">💡 Пример</div>
            <div style="line-height:1.6">${topic.example}</div>
          </div>
        ` : ''}
      `;

      // Chat character
      document.getElementById('chat-char-emoji').textContent = subj.emoji;
      document.getElementById('chat-char-name').textContent = subj.char;

      initChat(subjectId, { title: topic.title, theory: topic.theory });

      // Exercises — try multiple key variants
      const exKey = `${subjectId}_${grade}_${topicId}`;
      const exKey2 = `${subjectId}_${grade}_${topic.id}`;
      const ex = exercises[exKey] || exercises[exKey2] || null;
      document.getElementById('exercises-section').style.display = 'block';
      if (ex) {
        // Support both field name variants
        const mcqData   = ex.mcq      || [];
        const fillData  = ex.fill     || ex.fillblank || [];
        const matchData = ex.match    || [];
        renderMCQ(mcqData);
        renderFill(fillData);
        renderMatch(matchData);
      } else {
        const msg = '<p style="color:var(--text3);text-align:center;padding:20px">Упражнений пока нет — скоро добавим! 😊</p>';
        document.getElementById('ex-mcq').innerHTML = msg;
        document.getElementById('ex-fill').innerHTML = msg;
        document.getElementById('ex-match').innerHTML = msg;
      }

      // Tab switching
      document.querySelectorAll('.ex-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.ex-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.ex-panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('ex-' + tab.dataset.tab).classList.add('active');
        });
      });
    });

    function renderMCQ(questions) {
      const panel = document.getElementById('ex-mcq');
      if (!questions.length) { panel.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text3)">Нет вопросов</p>'; return; }
      let score = 0;
      let answered = 0;

      panel.innerHTML = questions.map((q, qi) => {
        // Support both q.q and q.question field names
        const qText = q.q || q.question || '';
        return `
          <div class="ex-item" id="mcq-q${qi}">
            <div class="ex-text">${qi+1}. ${qText}</div>
            <div>
              ${q.options.map((opt, oi) => `
                <button class="opt-btn" onclick="mcqAnswer(${qi},${oi},${q.correct})">${opt}</button>
              `).join('')}
            </div>
            <div class="feedback" id="mcq-fb${qi}" style="display:none"></div>
          </div>
        `;
      }).join('') + `<div id="mcq-score" style="display:none;text-align:center;padding:20px;font-weight:800;font-size:1.1rem;color:var(--sage)"></div>`;

      window.mcqAnswer = function(qi, selected, correct) {
        const qEl = document.getElementById('mcq-q' + qi);
        const btns = qEl.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);
        btns[selected].classList.add(selected === correct ? 'correct' : 'wrong');
        if (selected !== correct) btns[correct].classList.add('correct');
        const fb = document.getElementById('mcq-fb' + qi);
        const q = questions[qi];
        if (q.hint) { fb.textContent = '💡 ' + q.hint; fb.style.display = 'block'; }
        if (selected === correct) score++;
        answered++;
        if (answered === questions.length) {
          const scoreEl = document.getElementById('mcq-score');
          scoreEl.style.display = 'block';
          scoreEl.textContent = `Результат: ${score}/${questions.length} ✅`;
          exState.mcq = true;
          checkCompletion();
        }
      };
    }

    function renderFill(items) {
      const panel = document.getElementById('ex-fill');
      if (!items.length) { panel.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text3)">Нет упражнений</p>'; return; }

      panel.innerHTML = items.map((item, i) => {
        // Support both item.sentence and item.q field names
        const sentence = item.sentence || item.q || '';
        const parts = sentence.split('___');
        const ans = (item.answer || '').replace(/'/g, "\\'");
        const hint = (item.hint || 'Подумай ещё!').replace(/'/g, "\\'");
        return `
          <div class="ex-item" id="fill-${i}">
            <div class="ex-text">
              ${parts[0]}<input type="text" class="fill-input" id="fill-input-${i}" placeholder="впиши ответ">${parts[1] || ''}
            </div>
            <div style="display:flex;gap:8px;margin-top:10px">
              <button class="btn btn-primary btn-sm" onclick="checkFill(${i},'${ans}','${hint}')">Проверить ✓</button>
            </div>
            <div id="fill-fb-${i}" style="display:none;margin-top:8px;font-weight:700;font-size:.95rem"></div>
          </div>
        `;
      }).join('') + `<div id="fill-done" style="display:none;text-align:center;padding:20px;font-weight:800;font-size:1.1rem;color:var(--sage)">Все пропуски заполнены! 🎉</div>`;

      let fillDone = 0;
      window.checkFill = function(i, answer, hint) {
        const input = document.getElementById('fill-input-' + i);
        const fb = document.getElementById('fill-fb-' + i);
        const val = input.value.trim().toLowerCase();
        const correct = answer.toLowerCase();
        const isCorrect = val === correct || correct.startsWith(val) || val.startsWith(correct);
        if (isCorrect) {
          input.classList.remove('wrong'); input.classList.add('correct');
          input.disabled = true;
          fb.textContent = '✅ Правильно!'; fb.style.color = 'var(--sage)'; fb.style.display = 'block';
          fillDone++;
          if (fillDone === items.length) {
            document.getElementById('fill-done').style.display = 'block';
            exState.fill = true;
            checkCompletion();
          }
        } else {
          input.classList.add('wrong');
          fb.textContent = '💡 Подсказка: ' + hint; fb.style.color = 'var(--peach)'; fb.style.display = 'block';
          setTimeout(() => input.classList.remove('wrong'), 1200);
        }
      };
    }

    function renderMatch(rawPairs) {
      const panel = document.getElementById('ex-match');

      // Normalise: support {left,right} array OR {pairs:[[a,b],...]} format
      let pairs = [];
      if (Array.isArray(rawPairs)) {
        rawPairs.forEach(p => {
          if (p.pairs && Array.isArray(p.pairs)) {
            p.pairs.forEach(([l, r]) => pairs.push({left: l, right: r}));
          } else if (p.left !== undefined) {
            pairs.push({left: p.left, right: p.right});
          }
        });
      }

      if (!pairs.length) { panel.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text3)">Нет упражнений</p>'; return; }

      const shuffledRight = [...pairs].sort(() => Math.random() - 0.5);
      let selectedLeft = null;
      let matched = 0;

      panel.innerHTML = `
        <p style="color:var(--text3);font-size:.9rem;margin-bottom:14px">Нажми на левый элемент, потом на правый — найди пары</p>
        <div class="match-grid">
          <div id="match-left" style="display:flex;flex-direction:column;gap:10px">
            ${pairs.map((p, i) => `<div class="match-item" data-idx="${i}" data-side="left" onclick="selectMatch(this)">${p.left}</div>`).join('')}
          </div>
          <div id="match-right" style="display:flex;flex-direction:column;gap:10px">
            ${shuffledRight.map((p) => `<div class="match-item" data-val="${p.left.replace(/"/g,'&quot;')}" data-side="right" onclick="selectMatch(this)">${p.right}</div>`).join('')}
          </div>
        </div>
        <div id="match-done" style="display:none;text-align:center;padding:20px;font-weight:800;font-size:1.1rem;color:var(--sage)">Все пары найдены! 🎉</div>
      `;

      window.selectMatch = function(el) {
        if (el.classList.contains('matched')) return;
        const side = el.dataset.side;

        if (side === 'left') {
          document.querySelectorAll('.match-item[data-side="left"]').forEach(e => e.classList.remove('selected'));
          el.classList.add('selected');
          selectedLeft = el;
        } else if (selectedLeft) {
          const leftVal = pairs[parseInt(selectedLeft.dataset.idx)].left;
          const rightVal = el.dataset.val;

          if (leftVal === rightVal) {
            selectedLeft.classList.add('matched'); selectedLeft.classList.remove('selected');
            el.classList.add('matched');
            selectedLeft = null;
            matched++;
            if (matched === pairs.length) {
              document.getElementById('match-done').style.display = 'block';
              exState.match = true;
              checkCompletion();
            }
          } else {
            selectedLeft.classList.add('wrong'); el.classList.add('wrong');
            setTimeout(() => {
              if (selectedLeft) { selectedLeft.classList.remove('wrong','selected'); selectedLeft = null; }
              el.classList.remove('wrong');
            }, 900);
          }
        }
      };
    }

    function checkCompletion() {
      if (exState.mcq || exState.fill || exState.match) {
        const xp = currentTopic ? currentTopic.xp || 20 : 20;
        markTopicDone(subjectId, grade, topicId || (currentTopic && currentTopic.id), xp);

        const idx = allTopics.findIndex(t => t.id === (topicId || (currentTopic && currentTopic.id)));
        const next = allTopics[idx + 1];

        const completion = document.getElementById('ex-completion');
        completion.style.display = 'block';
        completion.innerHTML = `
          <div style="font-size:2.5rem;margin-bottom:12px">🎉</div>
          <h3 style="font-size:1.2rem;font-weight:900;color:var(--text);margin-bottom:8px">Отлично! +${xp} XP</h3>
          <p style="color:var(--text2);margin-bottom:20px">Тема пройдена! Продолжай в том же духе!</p>
          ${next ? `<a href="topic.html?subject=${subjectId}&grade=${grade}&topic=${next.id}" class="btn btn-primary">Следующая тема: ${next.title} →</a>` : `<a href="subject.html?id=${subjectId}&grade=${grade}" class="btn btn-secondary">Вернуться к темам</a>`}
        `;
      }
    }
  </script>
</body>
</html>
