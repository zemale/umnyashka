<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Урок — ПрофУчёба 🎓</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .lesson-header { padding:24px 0 16px; }
    .lesson-breadcrumb { font-size:.82rem; color:var(--text3); font-weight:700; margin-bottom:12px; }
    .lesson-breadcrumb a { color:var(--text3); text-decoration:none; }
    .lesson-breadcrumb a:hover { color:var(--sage); }
    .lesson-title-row { display:flex; align-items:flex-start; gap:14px; flex-wrap:wrap; }
    .lesson-prof-badge {
      display:flex; align-items:center; gap:8px; background:var(--card);
      border-radius:12px; border:1.5px solid var(--border); padding:8px 14px;
      font-weight:800; font-size:.85rem; flex-shrink:0;
    }
    .lesson-h1 { font-size:1.7rem; font-weight:900; margin-bottom:4px; }
    .lesson-sub { color:var(--text2); font-size:.9rem; }

    .lesson-layout {
      display:grid; grid-template-columns:220px 1fr;
      gap:22px; margin-bottom:48px; align-items:start;
    }
    @media(max-width:768px){ .lesson-layout{ grid-template-columns:1fr; } }

    /* Сайдбар */
    .topics-sidebar {
      background:var(--card); border-radius:18px;
      border:1.5px solid var(--border); overflow:hidden;
      position:sticky; top:80px;
    }
    .sidebar-label {
      padding:12px 16px; border-bottom:1px solid var(--border);
      font-size:.75rem; font-weight:900; text-transform:uppercase;
      letter-spacing:.05em; color:var(--text3); background:var(--bg2);
    }
    .topic-nav-item {
      display:flex; align-items:center; gap:9px;
      padding:10px 14px; cursor:pointer; font-size:.83rem; font-weight:700;
      border-bottom:1px solid var(--border); transition:background .15s;
    }
    .topic-nav-item:last-child { border-bottom:none; }
    .topic-nav-item:hover { background:var(--bg2); }
    .topic-nav-item.active { background:#e8f5ee; color:var(--sage); }
    .topic-nav-item.done { color:var(--text3); }
    .topic-nav-num {
      width:22px; height:22px; border-radius:50%; background:var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:.68rem; font-weight:900; flex-shrink:0;
    }
    .topic-nav-item.active .topic-nav-num { background:var(--sage); color:#fff; }
    .topic-nav-item.done .topic-nav-num { background:#d4edda; color:#28a745; }

    /* Список разделов */
    .section-item {
      background:var(--card); border-radius:16px; border:1.5px solid var(--border);
      margin-bottom:12px; overflow:hidden; transition:.2s;
    }
    .section-item.done { border-color:#c8e6d0; }
    .section-item.failed { border-color:#ffcdd2; }
    .section-header {
      display:flex; align-items:center; gap:12px;
      padding:14px 18px; cursor:pointer; transition:background .15s;
    }
    .section-header:hover { background:var(--bg2); }
    .section-item.done .section-header { background:#f0fff4; }
    .section-item.failed .section-header { background:#fff5f5; }
    .section-num {
      width:30px; height:30px; border-radius:50%; background:var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:.78rem; font-weight:900; flex-shrink:0;
    }
    .section-item.done .section-num { background:#d4edda; color:#28a745; font-size:.9rem; }
    .section-item.failed .section-num { background:#ffcdd2; color:#c62828; font-size:.9rem; }
    .section-item.active .section-num { background:var(--sage); color:#fff; }
    .section-title { flex:1; font-weight:800; font-size:.93rem; }
    .section-status { font-size:.75rem; font-weight:800; padding:3px 10px; border-radius:20px; }
    .status-done { background:#d4edda; color:#28a745; }
    .status-failed { background:#ffcdd2; color:#c62828; }
    .status-new { background:var(--bg2); color:var(--text3); }
    .section-arrow { color:var(--text3); font-size:.75rem; transition:.2s; margin-left:4px; }
    .section-item.open .section-arrow { transform:rotate(90deg); }

    .section-body { display:none; }
    .section-item.open .section-body { display:block; }

    /* Статьи */
    .articles-area { padding:0 18px 18px; }
    .article-card {
      border:1.5px solid var(--border); border-radius:14px; margin-bottom:14px; overflow:hidden;
    }
    .article-header {
      display:flex; align-items:center; gap:10px; padding:12px 16px;
      background:var(--bg2); border-bottom:1px solid var(--border);
    }
    .article-num {
      width:24px; height:24px; border-radius:50%; background:var(--sage); color:#fff;
      display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:900; flex-shrink:0;
    }
    .article-title { font-weight:900; font-size:.9rem; }
    .article-body { padding:14px 16px; font-size:.9rem; line-height:1.75; color:var(--text); }

    .read-btn {
      width:100%; padding:13px; background:var(--sage); color:#fff; border:none;
      border-radius:12px; font-family:'Nunito',sans-serif; font-weight:800;
      font-size:.95rem; cursor:pointer; transition:.2s; margin-top:4px;
    }
    .read-btn:hover { filter:brightness(1.08); }

    /* Тест */
    .test-area { padding:0 18px 18px; }
    .test-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px; flex-wrap:wrap; gap:8px;
    }
    .test-header h3 { font-size:1rem; font-weight:900; margin:0; }
    .test-score-badge {
      font-size:.8rem; font-weight:800; padding:4px 12px; border-radius:20px;
      background:var(--bg2); color:var(--text2);
    }
    .question-card {
      background:var(--bg2); border-radius:14px; padding:16px; margin-bottom:12px;
    }
    .question-text { font-weight:800; font-size:.92rem; margin-bottom:12px; line-height:1.4; }
    .question-num { font-size:.72rem; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
    .answer-options { display:flex; flex-direction:column; gap:7px; }
    .answer-btn {
      padding:10px 14px; border-radius:10px; border:1.5px solid var(--border);
      background:var(--card); font-family:'Nunito',sans-serif; font-size:.88rem;
      font-weight:700; cursor:pointer; text-align:left; transition:.15s; color:var(--text);
    }
    .answer-btn:hover:not(:disabled) { border-color:var(--sage); background:#f0f9f4; }
    .answer-btn.selected { border-color:var(--sage); background:#e8f5ee; color:var(--sage); }
    .answer-btn.correct { border-color:#28a745; background:#d4edda; color:#28a745; cursor:default; }
    .answer-btn.wrong { border-color:#dc3545; background:#ffcdd2; color:#dc3545; cursor:default; }
    .answer-btn:disabled { cursor:default; }

    .submit-test-btn {
      width:100%; padding:13px; background:var(--sage); color:#fff; border:none;
      border-radius:12px; font-family:'Nunito',sans-serif; font-weight:800;
      font-size:.95rem; cursor:pointer; transition:.2s; margin-top:8px;
    }
    .submit-test-btn:disabled { opacity:.45; cursor:default; }
    .submit-test-btn:not(:disabled):hover { filter:brightness(1.08); }

    .test-result-card {
      border-radius:14px; padding:20px; text-align:center; margin-top:12px;
    }
    .test-result-card.pass { background:#d4edda; border:2px solid #28a745; }
    .test-result-card.fail { background:#ffcdd2; border:2px solid #dc3545; }
    .result-big { font-size:2.5rem; margin-bottom:8px; }
    .result-title { font-size:1.1rem; font-weight:900; margin-bottom:6px; }
    .result-sub { font-size:.88rem; color:var(--text2); margin-bottom:14px; }
    .retry-btn {
      padding:10px 24px; background:#fff; border:2px solid #dc3545; color:#dc3545;
      border-radius:10px; font-family:'Nunito',sans-serif; font-weight:800;
      font-size:.88rem; cursor:pointer; transition:.2s;
    }
    .retry-btn:hover { background:#ffcdd2; }

    /* Генерация */
    .generating-card {
      background:var(--card); border-radius:20px; border:1.5px solid var(--border);
      padding:40px 24px; text-align:center;
    }
    .gen-spinner { font-size:2.5rem; animation:spin 2s linear infinite; display:inline-block; margin-bottom:14px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .gen-progress { margin-top:16px; height:6px; background:var(--border); border-radius:4px; }
    .gen-progress-fill { height:100%; background:var(--sage); border-radius:4px; width:0; transition:width .5s; }

    /* Навигация */
    .topic-nav-row { display:flex; gap:12px; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; }
    .nav-btn {
      padding:10px 20px; border-radius:12px; border:1.5px solid var(--border);
      background:var(--card); font-family:'Nunito',sans-serif; font-weight:800;
      font-size:.85rem; cursor:pointer; transition:.2s; color:var(--text);
    }
    .nav-btn:hover { background:var(--bg2); }
    .nav-btn.primary { background:var(--sage); color:#fff; border-color:var(--sage); }
    .nav-btn.primary:hover { filter:brightness(1.08); }
    .nav-btn:disabled { opacity:.4; cursor:default; }

    /* Чат */
    .chat-card { background:var(--card); border-radius:20px; border:1.5px solid var(--border); overflow:hidden; margin-top:4px; }
    .chat-card-header { display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); background:var(--bg2); }
    .chat-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; }
    .chat-info .cname { font-weight:900; font-size:.92rem; }
    .chat-info .cdesc { font-size:.73rem; color:var(--text2); }
    .chat-messages { height:260px; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
    .chat-msg { max-width:82%; padding:9px 12px; border-radius:13px; font-size:.88rem; line-height:1.5; }
    .chat-msg.user { align-self:flex-end; background:var(--sage); color:#fff; border-bottom-right-radius:3px; }
    .chat-msg.char { align-self:flex-start; background:var(--bg2); color:var(--text); border-bottom-left-radius:3px; }
    .chat-typing { align-self:flex-start; display:flex; gap:4px; padding:10px 12px; background:var(--bg2); border-radius:13px; }
    .chat-typing span { width:5px; height:5px; background:var(--text3); border-radius:50%; animation:tb .8s infinite; }
    .chat-typing span:nth-child(2){ animation-delay:.15s; }
    .chat-typing span:nth-child(3){ animation-delay:.3s; }
    @keyframes tb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .chat-input-row { display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--border); }
    .chat-input { flex:1; padding:8px 12px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg2); font-family:'Nunito',sans-serif; font-size:.88rem; color:var(--text); outline:none; }
    .chat-input:focus { border-color:var(--sage); }
    .chat-send-btn { padding:8px 14px; background:var(--sage); color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:800; font-family:'Nunito',sans-serif; transition:.2s; }
    .chat-send-btn:disabled { opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <div class="bg-deco"><div class="bg-blob blob1"></div><div class="bg-blob blob2"></div><div class="bg-blob blob3"></div></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">УмНяшка 🧠</a>
      <button class="nav-hamburger" onclick="this.nextElementSibling.classList.toggle('open')">☰</button>
      <div class="nav-links">
        <a href="subjects.html">Предметы</a>
        <a href="sections.html">Секции</a>
        <a href="profuniversity.html">ПрофУчёба</a>
        <a href="test.html">Диагностика</a>
        <a href="profile.html">Профиль</a>
        <span id="nav-xp" class="nav-badge">⭐ 0 XP</span>
        <span id="nav-streak" class="nav-badge">🔥 0</span>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="lesson-header">
      <div class="lesson-breadcrumb" id="breadcrumb">Загрузка...</div>
      <div class="lesson-title-row">
        <div class="lesson-prof-badge" id="prof-badge">⏳</div>
        <div>
          <div class="lesson-h1" id="lesson-title">Загрузка...</div>
          <div class="lesson-sub" id="lesson-sub"></div>
        </div>
      </div>
    </div>

    <div class="topic-nav-row" id="topic-nav-row"></div>

    <div class="lesson-layout">
      <div class="topics-sidebar">
        <div class="sidebar-label">📚 Темы курса</div>
        <div id="topics-nav"></div>
      </div>
      <div id="lesson-main">
        <div class="generating-card">
          <div class="gen-spinner">⚙️</div>
          <div style="font-weight:900;font-size:1.1rem;margin-bottom:8px">Готовим урок...</div>
          <div style="color:var(--text2);font-size:.88rem">Подождите секунду</div>
          <div class="gen-progress"><div class="gen-progress-fill" id="gen-fill"></div></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="container"><p>© 2025 УмНяшка 🧠</p></div></footer>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script src="config.js" onerror="console.log('no config')"></script>
  <script src="js/gemini.js"></script>
  <script>
  const params  = new URLSearchParams(location.search);
  const dirId   = params.get('dir');
  const profId  = params.get('prof');
  const topicId = params.get('topic');

  let dir = null, prof = null, currentTopic = null;
  let doneTopics   = get(`pu_done_${dirId}_${profId}`, []);
  let doneSections = get(`pu_secdone_${dirId}_${profId}_${topicId}`, []);
  let chatHistory  = [];
  let chatSending  = false;

  // ── Кеш ─────────────────────────────────────────────────────
  function getCached(key) { try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; } }
  function setCache(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

  // ── Генерация раздела (2 статьи + 5 вопросов) ───────────────
  async function generateSection(sectionTitle, sectionIdx) {
    const cacheKey = `pu_sec_${dirId}_${profId}_${currentTopic.id}_${sectionIdx}`;
    const cached = getCached(cacheKey);
    if (cached) return cached;

    const prompt = `Ты — ${prof.char}, наставник по профессии «${prof.name}».
Тема урока: «${currentTopic.title}». Раздел: «${sectionTitle}».
Аудитория: школьники 12–15 лет, которые хотят узнать о профессии.

Создай учебный материал в точном формате:

СТАТЬЯ1_ЗАГОЛОВОК: [заголовок первой статьи]
СТАТЬЯ1: [текст статьи — 5–7 предложений, простым живым языком, с примерами из жизни]

СТАТЬЯ2_ЗАГОЛОВОК: [заголовок второй статьи, другой угол зрения]
СТАТЬЯ2: [текст статьи — 5–7 предложений]

ВОПРОС1: [вопрос по содержанию статей]
А: [вариант]
Б: [вариант]
В: [вариант]
Г: [вариант]
ОТВЕТ1: [А/Б/В/Г]

ВОПРОС2: [вопрос]
А: [вариант]
Б: [вариант]
В: [вариант]
Г: [вариант]
ОТВЕТ2: [А/Б/В/Г]

ВОПРОС3: [вопрос]
А: [вариант]
Б: [вариант]
В: [вариант]
Г: [вариант]
ОТВЕТ3: [А/Б/В/Г]

ВОПРОС4: [вопрос]
А: [вариант]
Б: [вариант]
В: [вариант]
Г: [вариант]
ОТВЕТ4: [А/Б/В/Г]

ВОПРОС5: [вопрос]
А: [вариант]
Б: [вариант]
В: [вариант]
Г: [вариант]
ОТВЕТ5: [А/Б/В/Г]`;

    try {
      const result = await callGemini(
        `Ты ${prof.char}, наставник. Пишешь учебные материалы для школьников.`,
        [{ role:'user', parts:[{ text: prompt }] }], 0
      );
      const data = parseSectionContent(result);
      setCache(cacheKey, data);
      return data;
    } catch(e) {
      return getOfflineSection(sectionTitle);
    }
  }

  function parseSectionContent(text) {
    const clean = text.replace(/\*\*/g,'').replace(/\r\n/g,'\n');
    const lines = clean.split('\n').map(l => l.trim()).filter(Boolean);

    const data = { articles: [], questions: [] };
    let curArticle = null, curQ = null;

    for (const line of lines) {
      if (/^СТАТЬЯ\d_ЗАГОЛОВОК:/i.test(line)) {
        curArticle = { title: line.replace(/^СТАТЬЯ\d_ЗАГОЛОВОК:\s*/i,''), text:'' };
        data.articles.push(curArticle);
      } else if (/^СТАТЬЯ\d:/i.test(line)) {
        if (curArticle) curArticle.text = line.replace(/^СТАТЬЯ\d:\s*/i,'');
      } else if (curArticle && data.articles.length && !line.match(/^(ВОПРОС|А:|Б:|В:|Г:|ОТВЕТ)/i)) {
        if (curArticle.text && data.articles[data.articles.length-1] === curArticle) {
          curArticle.text += ' ' + line;
        }
      } else if (/^ВОПРОС\d:/i.test(line)) {
        curQ = { text: line.replace(/^ВОПРОС\d:\s*/i,''), options:{}, answer:'' };
        data.questions.push(curQ);
      } else if (curQ && /^[АБВГ]:/i.test(line)) {
        const letter = line[0].toUpperCase();
        curQ.options[letter] = line.replace(/^[АБВГ]:\s*/i,'');
      } else if (/^ОТВЕТ\d:/i.test(line) && curQ) {
        curQ.answer = line.replace(/^ОТВЕТ\d:\s*/i,'').trim().toUpperCase();
      }
    }
    return data;
  }

  function getOfflineSection(title) {
    return {
      articles: [
        { title: title, text: 'Для просмотра статей необходимо подключение к интернету. Зайди позже!' },
        { title: 'Дополнительно', text: 'Попробуй найти информацию по этой теме самостоятельно.' }
      ],
      questions: Array.from({length:5},(_,i) => ({
        text:`Вопрос ${i+1} (офлайн)`, options:{А:'—',Б:'—',В:'—',Г:'—'}, answer:'А'
      }))
    };
  }

  // ── Генерация списка разделов ────────────────────────────────
  async function generateSectionTitles() {
    const cacheKey = `pu_titles_${dirId}_${profId}_${currentTopic.id}`;
    const cached = getCached(cacheKey);
    if (cached) return cached;

    const prompt = `Профессия: «${prof.name}». Тема: «${currentTopic.title}».
Придумай 10 коротких названий разделов (подтем) для школьников 12–15 лет.
Каждое название — 3–5 слов, конкретное и интересное.
Формат — просто список, каждый раздел с новой строки, без нумерации и лишних символов.`;

    try {
      const result = await callGemini(
        'Ты методист, составляешь учебные программы.',
        [{ role:'user', parts:[{ text: prompt }] }], 0
      );
      const titles = result.replace(/\*\*/g,'').split('\n')
        .map(l => l.replace(/^\d+[\.\)]\s*/,'').trim())
        .filter(l => l.length > 3)
        .slice(0, 10);
      setCache(cacheKey, titles);
      return titles;
    } catch(e) {
      return Array.from({length:10},(_,i) => `Раздел ${i+1}: ${currentTopic.title}`);
    }
  }

  // ── Рендеринг ────────────────────────────────────────────────
  function renderTopicsNav() {
    document.getElementById('topics-nav').innerHTML = prof.topics.map((t, i) => {
      const done = doneTopics.includes(t.id);
      const active = t.id === currentTopic.id;
      return `<div class="topic-nav-item ${active?'active':''} ${done?'done':''}" onclick="navigateToTopic('${t.id}')">
        <div class="topic-nav-num">${done?'✓':i+1}</div>
        <div style="flex:1;font-size:.8rem">${t.title}</div>
      </div>`;
    }).join('');
  }

  function renderTopicNav() {
    const idx  = prof.topics.findIndex(t => t.id === currentTopic.id);
    const prev = prof.topics[idx-1];
    const next = prof.topics[idx+1];
    document.getElementById('topic-nav-row').innerHTML = `
      <button class="nav-btn" onclick="navigateToTopic('${prev?.id}')" ${!prev?'disabled':''}>← ${prev?prev.title:'Начало'}</button>
      <div style="color:var(--text3);font-size:.82rem;font-weight:700;align-self:center">Тема ${idx+1} / ${prof.topics.length}</div>
      <button class="nav-btn primary" onclick="navigateToTopic('${next?.id}')" ${!next?'disabled':''}>${next?next.title:'Конец курса'} →</button>`;
  }

  async function renderLesson() {
    const main = document.getElementById('lesson-main');
    main.innerHTML = `<div class="generating-card">
      <div class="gen-spinner">⚙️</div>
      <div style="font-weight:900;font-size:1.1rem;margin-bottom:8px">Составляем план урока...</div>
      <div style="color:var(--text2);font-size:.88rem">Тема: «${currentTopic.title}»</div>
      <div class="gen-progress"><div class="gen-progress-fill" id="gen-fill"></div></div>
    </div>`;

    let pct = 0;
    const iv = setInterval(() => { pct = Math.min(pct+10,85); const f=document.getElementById('gen-fill'); if(f) f.style.width=pct+'%'; }, 400);

    doneSections = get(`pu_secdone_${dirId}_${profId}_${currentTopic.id}`, []);
    const titles = await generateSectionTitles();
    clearInterval(iv);

    main.innerHTML = titles.map((title, i) => {
      const done   = doneSections.includes(i);
      const failed = (get(`pu_secfail_${dirId}_${profId}_${currentTopic.id}`, []) || []).includes(i);
      const statusHtml = done
        ? '<span class="section-status status-done">✅ Пройдено</span>'
        : failed ? '<span class="section-status status-failed">❌ Не пройдено</span>'
        : '<span class="section-status status-new">📖 Новый</span>';
      return `
        <div class="section-item ${done?'done':''} ${failed&&!done?'failed':''}" id="sec-${i}">
          <div class="section-header" onclick="openSection(${i}, '${title.replace(/'/g,"\\'")}')">
            <div class="section-num" id="secnum-${i}">${done?'✓':failed&&!done?'✗':i+1}</div>
            <div class="section-title">${title}</div>
            ${statusHtml}
            <div class="section-arrow" id="secarrow-${i}">▶</div>
          </div>
          <div class="section-body" id="secbody-${i}">
            <div style="padding:20px;text-align:center;color:var(--text2)">
              <div style="font-size:1.5rem;margin-bottom:8px">⚙️</div>
              Загружаем материал...
            </div>
          </div>
        </div>`;
    }).join('') + `<div id="chat-container"></div>`;

    initChat();
  }

  // Открытые секции
  const openedSections = new Set();
  const loadedSections = {};

  async function openSection(idx, title) {
    const body  = document.getElementById(`secbody-${idx}`);
    const arrow = document.getElementById(`secarrow-${idx}`);
    const sec   = document.getElementById(`sec-${idx}`);

    // Закрыть все остальные
    document.querySelectorAll('.section-item.open').forEach(el => {
      if (el.id !== `sec-${idx}`) {
        el.classList.remove('open');
        const a = el.querySelector('.section-arrow');
        if (a) a.style.transform = '';
      }
    });

    const isOpen = sec.classList.contains('open');
    if (isOpen) { sec.classList.remove('open'); arrow.style.transform=''; return; }

    sec.classList.add('open');
    arrow.style.transform = 'rotate(90deg)';

    if (loadedSections[idx]) return; // уже загружено

    // Загружаем контент
    body.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2)">
      <div class="gen-spinner" style="font-size:1.5rem">⚙️</div>
      <div style="margin-top:8px;font-size:.88rem">Генерируем статьи и тест...</div>
    </div>`;

    const data = await generateSection(title, idx);
    loadedSections[idx] = data;
    renderSectionContent(idx, title, data);
    sec.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  function renderSectionContent(idx, title, data) {
    const done = doneSections.includes(idx);
    const body = document.getElementById(`secbody-${idx}`);

    const articlesHtml = (data.articles || []).map((a, i) => `
      <div class="article-card">
        <div class="article-header">
          <div class="article-num">${i+1}</div>
          <div class="article-title">${a.title}</div>
        </div>
        <div class="article-body">${a.text.replace(/\n/g,'<br>')}</div>
      </div>`).join('');

    body.innerHTML = `
      <div class="articles-area">
        <div style="font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:10px">📰 Читай статьи</div>
        ${articlesHtml}
        ${!done ? `<button class="read-btn" onclick="showTest(${idx})">✅ Прочитал — пройти тест →</button>` : '<div style="background:#d4edda;border-radius:12px;padding:12px;text-align:center;font-weight:800;color:#28a745">✅ Раздел пройден!</div>'}
      </div>
      <div class="test-area" id="test-area-${idx}" style="display:none"></div>`;
  }

  function showTest(idx) {
    const data = loadedSections[idx];
    if (!data) return;
    const testArea = document.getElementById(`test-area-${idx}`);
    testArea.style.display = '';

    const answers = {}; // {qIdx: 'А'/'Б'/'В'/'Г'}

    function renderQuestions(showResult) {
      const questionsHtml = (data.questions || []).map((q, qi) => {
        const selected = answers[qi];
        const optHtml = Object.entries(q.options).map(([letter, text]) => {
          let cls = 'answer-btn';
          let disabled = '';
          if (showResult) {
            disabled = 'disabled';
            if (letter === q.answer) cls += ' correct';
            else if (letter === selected && selected !== q.answer) cls += ' wrong';
          } else if (letter === selected) cls += ' selected';
          return `<button class="${cls}" ${disabled} onclick="selectAnswer(${qi},'${letter}',${idx})">${letter}: ${text}</button>`;
        }).join('');
        return `<div class="question-card">
          <div class="question-num">Вопрос ${qi+1} из ${data.questions.length}</div>
          <div class="question-text">${q.text}</div>
          <div class="answer-options">${optHtml}</div>
        </div>`;
      }).join('');

      const answered = Object.keys(answers).length;
      testArea.innerHTML = `
        <div class="test-header">
          <h3>🧠 Проверь себя</h3>
          <span class="test-score-badge">Отвечено: ${answered}/${data.questions.length}</span>
        </div>
        ${questionsHtml}
        ${!showResult ? `<button class="submit-test-btn" id="submit-btn-${idx}" onclick="submitTest(${idx})" ${answered < data.questions.length ? 'disabled':''}>
          Проверить ответы →
        </button>` : ''}`;
    }

    window[`_answers_${idx}`] = answers;
    window[`_renderQ_${idx}`] = renderQuestions;
    renderQuestions(false);
  }

  function selectAnswer(qIdx, letter, secIdx) {
    const answers = window[`_answers_${secIdx}`];
    if (!answers) return;
    answers[qIdx] = letter;
    window[`_renderQ_${secIdx}`]?.(false);
  }

  function submitTest(secIdx) {
    const data = loadedSections[secIdx];
    const answers = window[`_answers_${secIdx}`];
    if (!data || !answers) return;

    let correct = 0;
    data.questions.forEach((q, i) => { if (answers[i] === q.answer) correct++; });
    const pass = correct >= 3;

    // Показываем правильные ответы
    window[`_renderQ_${secIdx}`]?.(true);

    const testArea = document.getElementById(`test-area-${secIdx}`);
    const resultDiv = document.createElement('div');
    resultDiv.className = `test-result-card ${pass?'pass':'fail'}`;
    resultDiv.innerHTML = `
      <div class="result-big">${pass ? '🎉' : '😔'}</div>
      <div class="result-title">${pass ? `Отлично! ${correct} из 5 правильно` : `${correct} из 5 — нужно минимум 3`}</div>
      <div class="result-sub">${pass ? 'Раздел пройден! +20 XP' : 'Перечитай статьи и попробуй снова'}</div>
      ${!pass ? `<button class="retry-btn" onclick="retryTest(${secIdx})">🔄 Попробовать снова</button>` : ''}`;
    testArea.appendChild(resultDiv);

    if (pass) {
      markSectionDone(secIdx);
    } else {
      // Запоминаем неудачу
      const fails = get(`pu_secfail_${dirId}_${profId}_${currentTopic.id}`, []);
      if (!fails.includes(secIdx)) { fails.push(secIdx); set(`pu_secfail_${dirId}_${profId}_${currentTopic.id}`, fails); }
      document.getElementById(`sec-${secIdx}`)?.classList.add('failed');
    }
  }

  function retryTest(secIdx) {
    window[`_answers_${secIdx}`] = {};
    showTest(secIdx);
  }

  function markSectionDone(idx) {
    if (doneSections.includes(idx)) return;
    doneSections.push(idx);
    set(`pu_secdone_${dirId}_${profId}_${currentTopic.id}`, doneSections);
    addXP(20, `Раздел: ${currentTopic.title}`);
    updateStreak();

    const sec = document.getElementById(`sec-${idx}`);
    const num = document.getElementById(`secnum-${idx}`);
    if (sec) { sec.classList.add('done'); sec.classList.remove('failed'); }
    if (num) num.textContent = '✓';

    // Проверяем завершение темы (все 10 разделов)
    if (doneSections.length >= 10) markTopicDone();
    renderTopicsNav();
  }

  function markTopicDone() {
    if (doneTopics.includes(currentTopic.id)) return;
    doneTopics.push(currentTopic.id);
    set(`pu_done_${dirId}_${profId}`, doneTopics);
    addXP(100, `Тема завершена: ${currentTopic.title}`);
    const banner = document.createElement('div');
    banner.style.cssText = 'background:var(--sage);color:#fff;border-radius:16px;padding:18px 24px;text-align:center;font-weight:800;font-size:1rem;margin-bottom:16px;';
    banner.innerHTML = '🎉 Тема полностью пройдена! +100 XP!';
    document.getElementById('lesson-main').prepend(banner);
    setTimeout(() => banner.remove(), 5000);
  }

  function navigateToTopic(topicId) {
    if (!topicId) return;
    location.href = `proflesson.html?dir=${dirId}&prof=${profId}&topic=${topicId}`;
  }

  // ── Чат ─────────────────────────────────────────────────────
  function initChat() {
    const container = document.getElementById('chat-container');
    if (!container) return;
    container.innerHTML = `
      <div class="chat-card" style="margin-top:16px">
        <div class="chat-card-header">
          <div class="chat-avatar" style="background:${dir.color}22">${prof.char_emoji}</div>
          <div class="chat-info">
            <div class="cname">${prof.char}</div>
            <div class="cdesc">${prof.char_desc}</div>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" class="chat-input" placeholder="Задай вопрос по теме...">
          <button id="chat-send" class="chat-send-btn">→</button>
        </div>
      </div>`;

    const msgs = document.getElementById('chat-messages');
    const inp  = document.getElementById('chat-input');
    const btn  = document.getElementById('chat-send');

    appendMsg('char', `Привет! Я ${prof.char} 👋 Изучаем «${currentTopic.title}». Если что-то непонятно в статьях — спрашивай!`);

    async function send() {
      const text = inp.value.trim();
      if (!text || chatSending) return;
      inp.value = '';
      appendMsg('user', text);
      chatSending = true; btn.disabled = true; btn.textContent = '...';
      const typing = document.createElement('div');
      typing.className = 'chat-typing'; typing.id = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      msgs.appendChild(typing); msgs.scrollTop = msgs.scrollHeight;
      try {
        const sys = `Ты — ${prof.char}, ${prof.char_desc}. Объясняешь школьнику 12–15 лет профессию «${prof.name}» (${dir.name}). Тема: «${currentTopic.title}». Говори просто, с примерами. 3–5 предложений.`;
        const reply = await callGemini(sys, [
          ...chatHistory.slice(-6).map(m => ({ role: m.r==='user'?'user':'model', parts:[{text:m.t}] })),
          { role:'user', parts:[{text}] }
        ]);
        document.getElementById('typing')?.remove();
        appendMsg('char', reply);
      } catch(e) {
        document.getElementById('typing')?.remove();
        appendMsg('char', 'Упс, что-то пошло не так 😅 Попробуй ещё раз!');
      } finally { chatSending=false; btn.disabled=false; btn.textContent='→'; inp.focus(); }
    }

    btn.addEventListener('click', send);
    inp.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();send();} });

    function appendMsg(role, text) {
      const d = document.createElement('div');
      d.className = 'chat-msg ' + role;
      d.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
      msgs.appendChild(d);
      chatHistory.push({r:role,t:text});
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  // ── Инициализация ────────────────────────────────────────────
  fetch('data/profuniversity.json').then(r=>r.json()).then(directions => {
    dir  = directions.find(d => d.id === dirId);
    if (!dir) return;
    prof = dir.professions.find(p => p.id === profId);
    if (!prof) return;
    currentTopic = prof.topics.find(t => t.id === topicId) || prof.topics[0];

    document.title = `${currentTopic.title} — ПрофУчёба 🎓`;
    document.getElementById('breadcrumb').innerHTML =
      `<a href="profuniversity.html">ПрофУчёба</a> → <a href="profdir.html?id=${dirId}">${dir.emoji} ${dir.name}</a> → ${prof.emoji} ${prof.name}`;
    document.getElementById('prof-badge').innerHTML = `${prof.char_emoji} ${prof.char}`;
    document.getElementById('lesson-title').textContent = currentTopic.title;
    document.getElementById('lesson-sub').textContent = `${prof.name} · ${dir.name}`;

    renderTopicsNav();
    renderTopicNav();
    renderLesson();
  });

  updateNavXP();
  updateNavStreak();
  </script>
</body>
</html>
